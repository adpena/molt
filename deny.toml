# cargo-deny configuration for the Molt workspace
# https://embarkstudios.github.io/cargo-deny/
#
# Run:  cargo deny check
# Lint: cargo deny check licenses advisories bans sources

[graph]
# Molt targets: native (macOS/Linux/Windows), wasm32
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "wasm32-unknown-unknown",
    "wasm32-wasip1",
]
all-features = true

# --------------------------------------------------------------------------- #
# Advisories — check the RustSec advisory database for known vulnerabilities
# --------------------------------------------------------------------------- #
[advisories]
# The path to the local advisory database (auto-fetched on first run)
db-path = "~/.cargo/advisory-db"
# Update the advisory database on every check
db-urls = ["https://github.com/rustsec/advisory-db"]
# Keep unmaintained advisories in scope so newly introduced unmaintained crates
# fail the gate unless they are explicitly reviewed in the ignore list below.
unmaintained = "all"
ignore = [
    { id = "RUSTSEC-2021-0127", reason = "Reviewed: serde_cbor is used for existing CBOR compatibility; replacement is tracked as dependency modernization, not a silent security bypass." },
    { id = "RUSTSEC-2024-0436", reason = "Reviewed: paste is transitive through Metal/MLX GPU crates; no patched upstream release is available." },
    { id = "RUSTSEC-2025-0075", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0080", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0081", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0090", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0098", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0100", reason = "Reviewed: rust-unic transitive parser dependency; parser replacement requires coordinated frontend migration." },
    { id = "RUSTSEC-2025-0134", reason = "Reviewed: rustls-pemfile is retained until direct rustls-pki-types parsing is migrated." },
]

# --------------------------------------------------------------------------- #
# Licenses — Molt is Apache-2.0; only allow permissive dependency licenses
# --------------------------------------------------------------------------- #
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8
unused-allowed-license = "allow"
unused-license-exception = "allow"

# Permissive licenses allowed for all dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "bzip2-1.0.6",
    "CDLA-Permissive-2.0",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
]

# Copyleft licenses are denied by default (anything not in `allow` is denied).
# The following are explicitly called out so the intent is clear:
# GPL-2.0, GPL-3.0, LGPL-2.1, LGPL-3.0, AGPL-3.0 — all denied.

# Some crates dual-license (e.g. MIT OR Apache-2.0). cargo-deny considers a
# crate acceptable if ANY license in its expression is in `allow`.
# This is the default behavior and what we want.

# Crate-specific license exceptions for packages whose license metadata
# cargo-deny cannot always detect cleanly from Cargo.toml alone.
# ring: ISC-style license (OpenSSL + ISC + MIT components)
# encoding_rs: (Apache-2.0 OR MIT) AND BSD-3-Clause
# bitmaps/im-rc/sized-chunks: MPL-2.0+ transitive dependencies of
# wasmtime's WASI P1 host path. The exception is crate-scoped so the
# workspace-wide default remains permissive-only.
# These are reviewed and compatible with Apache-2.0 for Molt distribution.
exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
    { allow = ["Apache-2.0", "MIT", "BSD-3-Clause"], name = "encoding_rs" },
    { allow = ["MPL-2.0"], name = "bitmaps" },
    { allow = ["MPL-2.0"], name = "im-rc" },
    { allow = ["MPL-2.0"], name = "sized-chunks" },
]

clarify = [
    { name = "mach-sys", expression = "Apache-2.0", license-files = [{ path = "LICENSE-APACHE-2.0", hash = 0xb5518783 }] },
]

# --------------------------------------------------------------------------- #
# Bans — control dependency duplication and deny problematic crates
# --------------------------------------------------------------------------- #
[bans]
# Do not use cargo-deny as the duplicate-version gate; the current GPU/WASM
# stack intentionally spans multiple major ecosystem lines. Vulnerabilities,
# source policy, license policy, and wildcard registry dependencies remain hard
# failures.
multiple-versions = "allow"

# Deny wildcard registry dependencies (version = "*") — these are unpinned and
# dangerous for reproducible builds. Workspace-local path dependencies are
# pinned by the checked-in repository state and Cargo.lock.
wildcards = "deny"

# Allow specific duplicates that are known ecosystem version-split situations.
# Each entry silences the multiple-versions warning for that crate.
allow-wildcard-paths = true
skip = []
skip-tree = []

# --------------------------------------------------------------------------- #
# Sources — restrict where crate code may come from
# --------------------------------------------------------------------------- #
[sources]
# Only allow crates from crates.io by default
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
