[workspace]
members = [
    "runtime/molt-runtime",
    "runtime/molt-obj-model",
    "runtime/molt-backend",
    "runtime/molt-db",
    "runtime/molt-python",
    "runtime/molt-worker",
    "runtime/molt-wasm-host",
    "runtime/molt-cpython-abi",
    "crates/molt-rs",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev-fast]
inherits = "dev"
opt-level = 1
debug = 1
codegen-units = 256
lto = "off"

[profile.release-fast]
inherits = "release"
opt-level = 2
lto = "off"
codegen-units = 128
strip = false

# WASM-optimized release profile: thin LTO instead of full, more codegen
# units for faster compilation while still producing well-optimized output.
[profile.wasm-release]
inherits = "release"
opt-level = 3
lto = "thin"
codegen-units = 4
panic = "abort"
strip = true

[patch.crates-io]
rustpython-parser = { path = "vendor/rustpython-parser" }
