[workspace]
members = [
    "runtime/molt-runtime",
    "runtime/molt-runtime-collections",
    "runtime/molt-runtime-itertools",
    "runtime/molt-runtime-crypto",
    "runtime/molt-runtime-compression",
    "runtime/molt-runtime-path",
    "runtime/molt-runtime-tk",
    "runtime/molt-obj-model",
    "runtime/molt-backend",
    "runtime/molt-db",
    "runtime/molt-worker",
    "runtime/molt-wasm-host",
    "runtime/molt-snapshot",
    "runtime/molt-embed",
    "runtime/molt-harness",
    "runtime/molt-runtime-protobuf",
    "runtime/molt-ffi",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 4
# panic = "unwind" is required for the backend's catch_unwind retry
# mechanism (handles Cranelift optimizer panics gracefully).
# panic = "abort" broke this entirely — catch_unwind was a no-op.
panic = "unwind"
strip = "symbols"
debug = 1

[profile.dev.package.molt-backend]
debug = 0

[profile.dev.package.cranelift-codegen]
debug = 0

