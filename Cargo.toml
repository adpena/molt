# Fast iteration profile: O2 with more codegen units for faster linking.
# The daemon uses this for quick recompilation during development.
[profile.release-fast]
inherits = "release"
opt-level = 2
lto = "thin"
codegen-units = 8
strip = "symbols"
panic = "unwind"

# Size-optimized release profile for micro stdlib builds.
# Uses opt-level "z" (minimize binary size) with full LTO.
[profile.release-size]
inherits = "release"
opt-level = "z"
lto = "thin"
codegen-units = 4
panic = "unwind"
strip = true

# WASM-optimized release profile: full LTO with single codegen unit for
# maximum cross-crate inlining and dead code elimination. Build time
# increases but runtime wasm artifacts are cached and infrequently rebuilt.
[profile.wasm-release]
inherits = "release"
opt-level = "z"  # minimize binary size for Cloudflare Workers 3MB limit
lto = "thin"
codegen-units = 4
panic = "unwind"
strip = true

[profile.dev-release]
inherits = "release"
lto = "thin"
codegen-units = 4
debug = 1

# Optimize runtime crates for SIZE — statically linked into output binaries.
# Runtime packages: opt-level 3 for maximum native performance.
# The WASM/size-optimized builds use profile.wasm-release (opt="z").
# These are the hot-path functions called millions of times — every
# bit of inlining, vectorization, and scheduling matters.
[profile.release.package.molt-runtime]
opt-level = 3
codegen-units = 1

[profile.release.package.molt-runtime-core]
opt-level = 3

[profile.release.package.molt-lang-obj-model]
opt-level = 3

[profile.release.package.molt-runtime-collections]
opt-level = 3
