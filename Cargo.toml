[workspace]
members = [
    "runtime/molt-runtime",
    "runtime/molt-obj-model",
    "runtime/molt-backend",
    "runtime/molt-db",
    "runtime/molt-worker",
    "runtime/molt-wasm-host",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev.package.molt-backend]
debug = 0

[profile.dev.package.cranelift-codegen]
debug = 0

[profile.dev.package.cranelift-frontend]
debug = 0

[profile.dev.package.cranelift-module]
debug = 0

[profile.dev.package.cranelift-native]
debug = 0

[profile.dev.package.cranelift-object]
debug = 0

[profile.dev.package.molt-runtime]
debug = 0

[profile.dev.package.aws-lc-rs]
debug = 0

[profile.dev.package.aws-lc-sys]
debug = 0

[profile.dev.package.rustpython-parser]
debug = 0

[profile.dev.package.rustpython-ast]
debug = 0

[profile.dev.package.rustpython-parser-core]
debug = 0

[profile.dev.package.rustls]
debug = 0

[profile.dev.package.rustls-webpki]
debug = 0

[profile.dev.package.tungstenite]
debug = 0

[profile.dev.package.url]
debug = 0

[profile.dev-fast]
inherits = "dev"
opt-level = 1
debug = 1
codegen-units = 256
lto = "off"

[profile.dev-fast.package.molt-backend]
debug = 0

[profile.dev-fast.package.cranelift-codegen]
debug = 0

[profile.dev-fast.package.cranelift-frontend]
debug = 0

[profile.dev-fast.package.cranelift-module]
debug = 0

[profile.dev-fast.package.cranelift-native]
debug = 0

[profile.dev-fast.package.cranelift-object]
debug = 0

[profile.dev-fast.package.molt-runtime]
debug = 0

[profile.dev-fast.package.aws-lc-rs]
debug = 0

[profile.dev-fast.package.aws-lc-sys]
debug = 0

[profile.dev-fast.package.rustpython-parser]
debug = 0

[profile.dev-fast.package.rustpython-ast]
debug = 0

[profile.dev-fast.package.rustpython-parser-core]
debug = 0

[profile.dev-fast.package.rustls]
debug = 0

[profile.dev-fast.package.rustls-webpki]
debug = 0

[profile.dev-fast.package.tungstenite]
debug = 0

[profile.dev-fast.package.url]
debug = 0

[profile.release-fast]
inherits = "release"
opt-level = 2
lto = "off"
codegen-units = 128
strip = false

# WASM-optimized release profile: full LTO with single codegen unit for
# maximum cross-crate inlining and dead code elimination. Build time
# increases but runtime wasm artifacts are cached and infrequently rebuilt.
[profile.wasm-release]
inherits = "release"
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
