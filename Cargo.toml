[workspace]
members = [
    "runtime/molt-runtime",
    "runtime/molt-runtime-collections",
    "runtime/molt-runtime-itertools",
    "runtime/molt-runtime-crypto",
    "runtime/molt-runtime-compression",
    "runtime/molt-runtime-path",
    "runtime/molt-runtime-tk",
    "runtime/molt-obj-model",
    "runtime/molt-backend",
    "runtime/molt-backend-luau",
    "runtime/molt-backend-rust",
    "runtime/molt-backend-wasm",
    "runtime/molt-db",
    "runtime/molt-worker",
    "runtime/molt-wasm-host",
    "runtime/molt-snapshot",
    "runtime/molt-embed",
    "runtime/molt-harness",
    "runtime/molt-runtime-protobuf",
    "runtime/molt-ffi",
    "runtime/molt-tier",
    "runtime/molt-gpu",
    "runtime/molt-ir",
    "runtime/molt-passes",
    "runtime/molt-tir",
    "runtime/molt-codegen-abi",
]
exclude = [
    "deploy/browser/simd-ops-rs",
    # molt-backend-mlir requires system LLVM 22 (mlir-sys). Excluded from
    # default workspace to prevent cargo check --all failures on machines
    # without LLVM installed. Build explicitly with:
    #   cargo check -p molt-backend-mlir
    "runtime/molt-backend-mlir",
]
resolver = "2"

[profile.dev]
opt-level = 0
debug = true
incremental = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 4
# panic = "unwind" is required for the backend's catch_unwind retry
# mechanism (handles Cranelift optimizer panics gracefully).
# panic = "abort" broke this entirely — catch_unwind was a no-op.
panic = "unwind"
strip = "symbols"
debug = 1

# Dev per-package overrides: opt-level 1 for hot compilation dependencies
# so that the backend and Cranelift pipeline are not painfully slow even in
# debug builds. debug = 0 on large transitive deps to cut link time and
# artifact size.
[profile.dev.package.molt-backend]
opt-level = 1
debug = 0

[profile.dev.package.molt-backend-luau]
opt-level = 1
debug = 0

[profile.dev.package.molt-backend-rust]
opt-level = 1
debug = 0

[profile.dev.package.cranelift-codegen]
