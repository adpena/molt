# =============================================================================
# bench/corpus/registry.toml — molt canonical-benchmark registry (doc 69 §5 task R)
# =============================================================================
#
# THE single source of truth for "which benchmark is which." One [[benchmark]]
# entry per CANONICAL benchmark, DEDUPED across every external suite per doc
# 69A §A.10 (the cross-suite dedup map). A kernel that recurs in CLBG +
# pyperformance + PyPy + Codon (nbody, fannkuch, spectral_norm, mandelbrot,
# pidigits, binary_trees, …) appears EXACTLY ONCE here, tagged with all of its
# `source_suites`. A win on such a kernel counts ONCE across the CPython + PyPy
# + Codon scoreboards — never triple-counted (doc 69A §A.10 dedup rule).
#
# Consumed by the S1–S6 suite adapters and the five scoreboards (doc 64):
#   S1 pyperformance (tools/pyperformance_adapter.py)  — source_suites ∋ "pyperformance"
#   S2 pypy/benchmarks                                 — source_suites ∋ "pypy"
#   S3 Codon bench/                                    — source_suites ∋ "codon"
#   S4 Computer Language Benchmarks Game               — source_suites ∋ "clbg"
#   S5 real-world apps (Pyston macro, TFB, orjson…)    — source_suites ∋ "pyston"/"tfb"/…
#   S6 CPython regrtest                                — source_suites ∋ "regrtest"
# plus the molt-stress corpus (origin = "molt-stress") and the scientific
# Tier-A/B lanes (numba-benchmark, NPBench) from doc 69A §A.7.
#
# -----------------------------------------------------------------------------
# SCHEMA (doc 69 §1) — every [[benchmark]] entry:
#   id                  = "nbody"            # canonical, unique across the file
#   source_suites       = ["clbg","pyperformance","pypy","codon"]
#   origin              = "CLBG"             # provenance root (doc 69A §A.6 lineage)
#   category            = "float-kernel"     # the §A.9 discriminating category
#   semantic_tier = { cpython = "...", pypy = "...", codon = "..." }
#       per-engine semantic classification. Values reuse the suite_honesty /
#       manifest.toml vocabulary:
#         cpython : runs_unmodified | requires_adapter | unsupported_by_molt
#                   (CPython is the universal oracle; ~always runs_unmodified)
#         pypy    : equivalent | non_equivalent | unsupported
#         codon   : equivalent | non_equivalent | unsupported
#       A cross-engine comparison is a WIN/LOSS only where that engine is
#       "equivalent". "non_equivalent" cells are reported, NEVER scored
#       (doc 69A §A.0.2: the three Codon non-equivalent zones — bignum, Unicode,
#       C-semantics numerics — are correctness divergences, not perf).
#   non_equivalent_reason = "..."  # REQUIRED whenever any engine != equivalent
#                                    (except plain "unsupported"); names the zone.
#   version_gates       = []  # or e.g. ["py>=3.12"], ["py>=3.13"] — the (os,arch,
#                             # python_version) gating posture of doc 69 §3a.
#   parametrized_sizes  = ["pyperf","clbg"]  # named size presets a win must hold
#                             # across (doc 69 §1: "a win must hold across scales").
#                             # "pyperf" = pyperf autorange ~100ms value;
#                             # "clbg"   = the CLBG fixed timed-N (heavy);
#                             # "npbench"= NPBench S/M/L/paper presets;
#                             # "stress" = molt-stress large-input variant.
#   c_accelerated       = true   # OPTIONAL. CPython baseline is a C/Rust/Cython
#                             # extension, not the bytecode interpreter. molt's
#                             # honest comparison is "molt impl vs native tool"
#                             # in a SEPARATE column from "molt vs CPython
#                             # interpreter" (doc 69A §A.0.3). Never conflate.
#
# CONSTITUTION (doc 69 §6): faster than CPython on EVERY cell × backend × target
# × arch × OS × profile × version; non-equivalent models marked, never scored;
# ONE canonical registry (no duplicate benchmark truth); host-fingerprinted +
# version-gated. This file is the "no duplicate benchmark truth" invariant.
#
# schema_version mirrors bench/friends/manifest.toml's convention.
# =============================================================================

schema_version = 1

# -----------------------------------------------------------------------------
# [suites] — pinned source custody for every external suite (doc 69A §A.11,
# doc 69 §2 acquisition). `repo_ref` MUST be an immutable tag/commit before an
# adapter is enabled (manifest.toml source-custody rule). License governs
# vendoring. Two corrections baked in (doc 69A §A.11): the Codon paper is CC
# 2023 (DOI 10.1145/3578360.3580275), NOT CGO; and Codon is Apache-2.0 as of
# 2025 (relicensed from BUSL) — vendorable only from a current checkout.
# -----------------------------------------------------------------------------

[suites.pyperformance]
adapter      = "S1"
acquire      = "pip install pyperformance / git clone https://github.com/python/pyperformance"
repo_url     = "https://github.com/python/pyperformance.git"
repo_ref     = "1.14.0"                  # 2026-02-07; authoritative list = data-files/benchmarks/MANIFEST
license      = "MIT"
vendorable   = true
methodology  = "pyperf"                  # workers/calibration/autorange/JSON/stats; never 2 concurrently
notes        = "Official CPython suite — the CPython-reference axis. Descends from Unladen Swallow. NOT tuned for PyPy (use the pypy suite for PyPy)."

[suites.pyperf]
adapter      = "S1-engine"
acquire      = "pip install pyperf"
repo_url     = "https://github.com/psf/pyperf.git"
repo_ref     = "latest-stable"           # the timing/statistics engine under pyperformance; pin alongside S1
license      = "MIT"
vendorable   = true
notes        = "Calibration/worker/statistics discipline — the doc 69 §3 adaptive-sampling target."

[suites.clbg]
adapter      = "S4"
acquire      = "git clone https://salsa.debian.org/benchmarksgame-team/benchmarksgame.git"
repo_url     = "https://salsa.debian.org/benchmarksgame-team/benchmarksgame.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"  # pin a commit before enabling S4 (doc 69A §A.2)
license      = "Revised BSD (3-clause)"  # © 2004-08 Fulgham, 2005-24 Gouy; retain name-endorsement clause
vendorable   = true
methodology  = "clbg"                    # BenchExec, fixed-N single-shot, 12x discard-first; peak mem + gzipped source size first-class
notes        = "Computer Language Benchmarks Game — root of the recurring kernels (CLBG->Unladen->{pyperformance,PyPy}). Cold start + binary/source footprint are first-class metrics here."

[suites.pypy]
adapter      = "S2"
acquire      = "hg clone https://foss.heptapod.net/pypy/benchmarks"
repo_url     = "https://foss.heptapod.net/pypy/benchmarks"
repo_ref     = "PINNED_COMMIT_REQUIRED"  # Heptapod is bot-walled; a real hg clone is needed for exact own/ filenames (doc 69A §A.11 gap)
license      = "mixed (per-benchmark only)"  # bundles whole apps (Django/Twisted/SymPy/…), each its own license — vendor per-benchmark, NEVER suite-wide
vendorable   = "per-benchmark"
methodology  = "pypy-jit-warmup"         # long JIT warmup to steady state; speed.pypy.org Codespeed; geometric mean
notes        = "PyPy-reference / dynamic axis. A fork of Unladen Swallow. The ideal 'PyPy dynamic reference' set for molt (every bench exercises dynamic dispatch / attr lookup / alloc)."

[suites.codon]
adapter      = "S3"
acquire      = "bash -c \"$(curl -fsSL https://exaloop.io/install.sh)\" / git clone https://github.com/exaloop/codon.git"
repo_url     = "https://github.com/exaloop/codon.git"
repo_ref     = "PINNED_CURRENT_APACHE_COMMIT_REQUIRED"  # pin a CURRENT Apache-era commit; pre-2025 BUSL tags are non-commercial (doc 69A §A.5/§A.11)
license      = "Apache-2.0"              # relicensed from BUSL/BSL 1.1 in 2025; paper text is CC BY-NC-ND
vendorable   = true
methodology  = "codon-release"           # bench/run.sh, release (-O3-class) mode, single-thread headline, Boehm GC, forked LLVM
paper        = "Shajii et al., 'Codon: A Compiler for High-Performance Pythonic Applications and DSLs', CC 2023, DOI 10.1145/3578360.3580275"
notes        = "AOT/native-reference axis. 64-bit int (NOT bignum), C-semantics numerics by default, ASCII str, dict does NOT preserve insertion order, static monomorphization (no runtime polymorphism/reflection/metaclass/monkeypatch), no full C-API, no exec/eval. Ships a from-scratch compiled NumPy (2025) — makes the scientific Tier-B lane Codon-comparable."

[suites.pyston]
adapter      = "S5"
acquire      = "git clone https://github.com/pyston/python-macrobenchmarks"
repo_url     = "https://github.com/pyston/python-macrobenchmarks.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "MIT"                     # suite-wide clean; pip deps (torch/Pyramid/gevent/…) carry their own
vendorable   = true
methodology  = "pyperf"                  # web benches report mean AND p99 latency; warmup = time to 95% of peak
notes        = "Real-application macro axis (built because existing benchmarks were 'too small'). Near-zero overlap with PyPy/CLBG — a clean third axis. Group pyston_standard = djangocms+flaskblogging+kinto."

[suites.regrtest]
adapter      = "S6"
acquire      = "CPython Lib/test via libregrtest"
repo_url     = "https://github.com/python/cpython.git"
repo_ref     = "per-python-version"      # 3.12 / 3.13 / 3.14 — version-gated (doc 69 §3a)
license      = "PSF"
vendorable   = true
notes        = "CPython's own regression suite — simultaneously the ultimate parity oracle (doc 66) AND a stress corpus (long-running, allocation-heavy, adversarial). Must run GREEN per Python version and, where timed, faster than CPython."

# --- Scientific lanes (doc 69A §A.7) ----------------------------------------

[suites.npbench]
adapter      = "sci-tierB"
acquire      = "git clone https://github.com/spcl/npbench"
repo_url     = "https://github.com/spcl/npbench.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "BSD-3"
vendorable   = true
methodology  = "npbench"                 # 4 size presets; run 10x median; speedup vs NumPy median; 95% CI bootstrap; EVERY output validated vs NumPy reference (matches doc 66 oracle)
notes        = "Codon's 2025 NumPy reference (2.4x geomean, up to 900x). PolyBench ships BOTH *_numpy.py (Tier B) and explicit-loop forms (Tier A — cleanest molt-vs-Codon-vs-PyPy)."

[suites.numba_benchmark]
adapter      = "sci-tierA"
acquire      = "git clone https://github.com/numba/numba-benchmark"
repo_url     = "https://github.com/numba/numba-benchmark.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "BSD-2"
vendorable   = true
methodology  = "asv"                     # per-commit isolation + peakmem (a doc 69 §3 methodology reference)
notes        = "The Tier-A jackpot: cleanest molt-comparable set across all four engines — explicit scalar Python loops, no C-ext, matched semantics."

# --- Real-world / serialization / async / ML payload sources (doc 69A §A.8/§A.9) ---

[suites.tfb]
adapter      = "S5"
acquire      = "git clone https://github.com/TechEmpower/FrameworkBenchmarks"
repo_url     = "https://github.com/TechEmpower/FrameworkBenchmarks.git"
repo_ref     = "Round-23"                # archived read-only 2026-03-24; latest round
license      = "BSD-3"
vendorable   = true
notes        = "Web framework axis. The fast frameworks are dominated by C/Rust server cores (uvicorn=uvloop+httptools, blacksheep=Cython, granian/robyn/socketify=Rust/C) — flag those. Pure-Python dispatch (flask/bottle/django/falcon/pyramid/tornado/cherrypy + app layer of starlette/fastapi/sanic/quart) is molt-measurable."

[suites.orjson]
adapter      = "json-payloads"
acquire      = "git clone https://github.com/ijl/orjson (bench/data)"
repo_url     = "https://github.com/ijl/orjson.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "Apache/MPL/MIT"
vendorable   = true
notes        = "Reusable 4-file JSON corpus: twitter.json(631K), github.json(55K), citm_catalog.json(1.7M), canada.json(2.2M float-heavy)."

[suites.uvloop]
adapter      = "async-harness"
acquire      = "git clone https://github.com/MagicStack/uvloop (examples/bench)"
repo_url     = "https://github.com/MagicStack/uvloop.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "MIT/Apache"
vendorable   = true
notes        = "Async harness (echoserver.py/echoclient.py). uvloop itself is Cython+libuv = best-native-tool column, not interpreter speed, not Codon-buildable."

[suites.tinygrad]
adapter      = "ml-lane"
acquire      = "git clone https://github.com/tinygrad/tinygrad"
repo_url     = "https://github.com/tinygrad/tinygrad.git"
repo_ref     = "a83710396c991272241e40da94489747c2393851"   # matches bench/friends/manifest.toml pin
license      = "MIT"
vendorable   = true
notes        = "The public ML contract — exact-semantics, NO drift (CLAUDE.md). The real compiler test = tinygrad's pure-Python scheduler/kernel-fusion graph build, NOT raw matmul. Separate Python-orchestration time from tensor-kernel (GPU/BLAS) time."

[suites.mlperf_inference]
adapter      = "ml-lane"
acquire      = "git clone https://github.com/mlcommons/inference"
repo_url     = "https://github.com/mlcommons/inference.git"
repo_ref     = "PINNED_COMMIT_REQUIRED"
license      = "Apache-2.0"
vendorable   = true
notes        = "The LoadGen is the Python-facing component — measure orchestration overhead there (kernel time dominates -> flag)."


# =============================================================================
# CANONICAL BENCHMARKS
# =============================================================================
# Ordering: (1) the CLBG-rooted spine (deduped, every source suite tagged) →
# (2) Unladen/Smalltalk kernels shared by pyperformance + PyPy → (3) the bignum
# Codon-non-equivalent zone → (4) Unicode/string/regex zone → (5) C-semantics
# numeric-edge zone → (6) GC/finalizer + dispatch + recursion + generator +
# exception discriminators → (7) C-accelerated serialize/template/web/async →
# (8) PyPy-only & Pyston-only axes → (9) Codon-only kernels → (10) scientific
# Tier-A/Tier-B → (11) the molt-stress corpus. Comments call out the §A.10 row
# and the §A.0.2 non-equivalent zone for each.
# =============================================================================


# -----------------------------------------------------------------------------
# (1) CLBG-ROOTED SPINE — doc 69A §A.0.1 / §A.10. The four+ kernels that are the
# spine of the entire ecosystem; each registered ONCE, tagged with every suite.
# -----------------------------------------------------------------------------

[[benchmark]]
id = "nbody"
source_suites = ["clbg", "pyperformance", "pypy", "codon"]
origin = "CLBG"
category = "float-kernel"
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
version_gates = []
parametrized_sizes = ["pyperf", "clbg"]   # pyperf ~100ms; clbg N=50M scalar FP loop
# Codon FP bake-off kernel. pyperformance 1.12 also added an nbody Barnes-Hut
# quadtree variant — see `nbody_barnes_hut` below (distinct algorithm).

[[benchmark]]
id = "spectral_norm"
source_suites = ["clbg", "pyperformance", "pypy", "codon"]
origin = "CLBG"
category = "float-kernel"
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
version_gates = []
parametrized_sizes = ["pyperf", "clbg"]   # clbg N=5500: FP + nested loops + sqrt

[[benchmark]]
id = "fannkuch"
source_suites = ["clbg", "pyperformance", "pypy", "codon"]
origin = "CLBG"                            # CLBG "fannkuch-redux"; Codon @par dynamic variant
category = "int-array-kernel"
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
version_gates = []
parametrized_sizes = ["pyperf", "clbg"]   # clbg N=12: int + array + in-place reverse

[[benchmark]]
id = "mandelbrot"
source_suites = ["clbg", "codon", "npbench"]   # §A.10: pyperf via NPBench/Codon, not core pyperf MANIFEST
origin = "CLBG"
category = "float-kernel"
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
version_gates = []
parametrized_sizes = ["clbg", "npbench"]  # clbg N=16000: FP + complex + bit-packed output; Codon mandelbrot uses @par(gpu=True)
# NPBench ships mandelbrot1/mandelbrot2 array forms; the CLBG scalar form is the canonical loop kernel.

[[benchmark]]
id = "pidigits"
source_suites = ["clbg", "pyperformance", "pypy", "codon"]
origin = "CLBG"
category = "bignum"
# ⚠ Codon NON-EQUIVALENT — bignum zone (doc 69A §A.0.2(a)): Codon int is 64-bit
# and wraps silently; pidigits is arbitrary-precision spigot. A Codon "win" is meaningless.
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "non_equivalent" }
non_equivalent_reason = "codon: arbitrary-precision integers — Codon int is 64-bit, wraps silently; -numerics=py does not restore bignum"
version_gates = []
parametrized_sizes = ["pyperf", "clbg"]   # clbg N=10000 digits

[[benchmark]]
id = "binary_trees"
source_suites = ["clbg", "codon"]          # §A.10: pyperf-adjacent via barnes_hut; Codon uses Boehm
origin = "CLBG"                            # GCBench / Boehm lineage
category = "gc-alloc"
# The RC-overhead exposer — the ownership-lattice fixture (CLAUDE.md council doctrine).
# Pools/arenas prohibited by CLBG rules. Codon equivalent (Boehm GC, no bignum/Unicode).
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
version_gates = []
parametrized_sizes = ["clbg"]             # clbg depth=21: alloc + GC stress

[[benchmark]]
id = "fasta"
source_suites = ["clbg"]
origin = "CLBG"
category = "string-rng"
# ASCII output — Codon-equivalent in principle, but not in Codon's bench/ set.
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
non_equivalent_reason = "codon: equivalent on ASCII output but not present in Codon bench/ — comparison is via vendored CLBG source only"
version_gates = []
parametrized_sizes = ["clbg"]             # clbg N=25M: LCG RNG + cumulative lookup + bulk str

[[benchmark]]
id = "k_nucleotide"
source_suites = ["clbg"]
origin = "CLBG"
category = "dict-string"
# dict + str-hash + count-in-place over ASCII. Codon dict does NOT preserve
# insertion order — equivalent ONLY because k-nucleotide is order-independent.
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
non_equivalent_reason = "codon: equivalent only because counting is dict-order-independent; Codon dict does not preserve insertion order (would be non_equivalent for any order-observing variant)"
version_gates = []
parametrized_sizes = ["clbg"]             # input = fasta N=25M

[[benchmark]]
id = "reverse_complement"
source_suites = ["clbg"]
origin = "CLBG"
category = "string-io"
# byte translate + buffered IO + reverse over ASCII. Codon-equivalent (ASCII).
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "equivalent" }
non_equivalent_reason = "codon: equivalent on ASCII bytes but not in Codon bench/ — vendored CLBG source comparison only"
version_gates = []
parametrized_sizes = ["clbg"]             # clbg ~25MB input

[[benchmark]]
id = "regex_redux"
source_suites = ["clbg", "pyperformance"]  # pyperf has regex_dna which is the same CLBG problem family
origin = "CLBG"
category = "regex"
# ⚠ Codon NON-EQUIVALENT — engine-dependent (regex engine is not Codon's model);
# also Unicode-adjacent. The win/loss bar is CPython's regex engine fidelity.
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "non_equivalent" }
non_equivalent_reason = "codon: regex-engine-dependent — no equivalent compiled regex model; correctness divergence not perf"
version_gates = []
parametrized_sizes = ["clbg"]             # clbg ~5MB fasta input
# NOTE: pyperformance regex_dna is the SAME CLBG problem — deduped HERE, tagged
# pyperformance. pyperf's regex_v8 / regex_effbot / regex_compile are DISTINCT
# (different corpora) and registered separately below.

[[benchmark]]
id = "meteor_contest"
source_suites = ["clbg", "pyperformance", "pypy"]   # §A.10: CLBG historical, still in pyperformance + PyPy
origin = "CLBG"
category = "puzzle-search"
# Codon: not in bench/ and search/backtracking over board state — leave unsupported-as-comparison.
semantic_tier = { cpython = "runs_unmodified", pypy = "equivalent", codon = "unsupported" }
non_equivalent_reason = "codon: not present in Codon bench/; backtracking puzzle not part of Codon's measured set"
version_gates = []
parametrized_sizes = ["pyperf", "clbg"]


# -----------------------------------------------------------------------------
# (2) UNLADEN / SMALLTALK / V8 KERNELS — doc 69A §A.10. Shared by pyperformance
