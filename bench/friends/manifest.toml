[[suite]]
id = "tinygrad_off_the_shelf"
enabled = true
friend = "tinygrad"
display_name = "tinygrad Off-The-Shelf API Workloads"
source = "git"
repo_url = "https://github.com/tinygrad/tinygrad.git"
repo_ref = "a83710396c991272241e40da94489747c2393851"
semantic_mode = "runs_unmodified"
adapter_notes = "Compile/profile unmodified upstream tinygrad package code through tools/tinygrad_off_shelf_adapter.py; use adapter only as the public-API benchmark driver, never as a patched tinygrad fork."
tags = ["gpu", "mlir", "tinygrad", "compatibility", "benchmark-suite"]
repeat = 5
timeout_sec = 1800
env = { CACHEDB = "{output_root}/tinygrad_cache/tinygrad/cache.db", DEV = "PYTHON", PYTHONDONTWRITEBYTECODE = "1", XDG_CACHE_HOME = "{output_root}/tinygrad_cache" }
prepare_cmds = [
  ["{python}", "{repo_root}/tools/tinygrad_upat_static_exec_registry.py", "--suite-root", "{suite_root}", "--repo-root", "{repo_root}", "--workload", "all", "--iterations", "1", "--manifest-output", "{output_root}/tinygrad_static_exec/manifest.json", "--module-output", "{output_root}/tinygrad_static_exec/_molt_tinygrad_upat_static_exec_registry.py", "--json"],
]

[suite.runners.cpython]
json_stdout = true
env = { DEV = "PYTHON", PYTHONDONTWRITEBYTECODE = "1" }
run_cmd = ["uv", "run", "--isolated", "--no-project", "--python", "{python}", "--with", "typeguard", "python", "{repo_root}/tools/tinygrad_off_shelf_adapter.py", "--suite-root", "{suite_root}", "--workload", "all", "--iterations", "20", "--json"]

[suite.runners.molt]
json_stdout = true
env = { DEV = "PYTHON", MOLT_MODULE_ROOTS = "{suite_root}{pathsep}{output_root}/tinygrad_static_exec", MOLT_EXTERNAL_STATIC_PACKAGES = "tinygrad _molt_tinygrad_upat_static_exec_registry", MOLT_STATIC_IMPORT_MODULES = "tinygrad.runtime.ops_python tinygrad.uop.ops _molt_tinygrad_upat_static_exec_registry", MOLT_TINYGRAD_UPAT_STATIC_EXEC_ROOT = "{output_root}/tinygrad_static_exec", PYTHONDONTWRITEBYTECODE = "1", PYTHONPATH = "{repo_root}/src{pathsep}{suite_root}{pathsep}{output_root}/tinygrad_static_exec" }
run_cmd = ["{project_python}", "-m", "molt.cli", "run", "--profile", "dev", "--capabilities", "ffi.unsafe", "--build-arg=--stdlib-profile", "--build-arg=full", "--build-arg=--rebuild", "--build-arg=--no-cache", "{repo_root}/tools/tinygrad_off_shelf_adapter.py", "--", "--suite-root", "{suite_root}", "--workload", "all", "--iterations", "20", "--json"]

[suite.runners.tinygrad]
env = { CHECK_OOB = "0", DEV = "CPU", PYTHONDONTWRITEBYTECODE = "1", TYPED = "1", PYTHONPATH = "{suite_root}" }
run_cmd = ["uv", "run", "--isolated", "--no-project", "--python", "{python}", "--with", "typeguard", "python", "test/test_tiny.py"]

[[suite]]
id = "numpy_off_the_shelf"
enabled = true
friend = "numpy"
display_name = "NumPy Off-The-Shelf Source And API Probe"
source = "git"
repo_url = "https://github.com/numpy/numpy.git"
repo_ref = "c81c49f77451340651a751e76bca607d85e4fd55"
semantic_mode = "runs_unmodified"
adapter_notes = "Canonical NumPy compile/probe lane. The source runner verifies the pinned checkout; the CPython runner executes a pinned isolated NumPy baseline through tools/numpy_off_shelf_adapter.py; the Molt runner attempts the same public workloads through MOLT_EXTERNAL_STATIC_PACKAGES=numpy, which now fail-closed validates package-local native artifact sidecars before graph/lowering and must stay red until the libmolt source-recompiled package build/staging/runtime path is complete. No host-Python fallback or patched NumPy sources are allowed."
tags = ["ecosystem", "numpy", "c-api", "scientific-python", "compile-time"]
repeat = 1
timeout_sec = 1800

[suite.runners.cpython]
role = "workload"
json_stdout = true
run_cmd = ["uv", "run", "--isolated", "--python", "{python}", "--with", "numpy==2.4.2", "python", "{repo_root}/tools/numpy_off_shelf_adapter.py", "--workload", "all", "--iterations", "5", "--json", "--require-version", "2.4.2"]

[suite.runners.molt]
role = "workload"
json_stdout = true
env = { MOLT_MODULE_ROOTS = "{suite_root}", MOLT_EXTERNAL_STATIC_PACKAGES = "numpy", PYTHONPATH = "{repo_root}/src:{suite_root}" }
run_cmd = ["{project_python}", "-m", "molt.cli", "run", "--profile", "dev", "--build-arg=--stdlib-profile", "--build-arg=full", "--capabilities", "module.extension.exec", "{repo_root}/tools/numpy_off_shelf_adapter.py", "--", "--suite-root", "{suite_root}", "--workload", "all", "--iterations", "5", "--json", "--require-module-under", "{suite_root}"]

[suite.runners.c_api_scan]
role = "c_api_scan"
json_stdout = true
run_cmd = ["{project_python}", "-m", "molt.cli", "extension", "scan", "--project", "{suite_root}", "--source", "{suite_root}/numpy", "--fail-on-missing", "--json"]

[suite.runners.source_audit]
role = "custody_audit"
json_stdout = true
run_cmd = ["{python}", "{repo_root}/tools/numpy_off_shelf_adapter.py", "--suite-root", "{suite_root}", "--source-tree-audit", "--workload", "none", "--json"]

[[suite]]
id = "pyperformance_benchmarks"
enabled = true
friend = "pyperformance"
display_name = "PyPerformance Full Corpus (v1.14.0)"
source = "git"
repo_url = "https://github.com/python/pyperformance.git"
repo_ref = "1.14.0"
semantic_mode = "requires_adapter"
adapter_notes = "Runs the FULL pyperformance v1.14.0 corpus (97 IDs) in-process via tools/pyperformance_adapter.py run-all; per-benchmark c_accelerated flagging per 69A A.1; async/bench_command/multiprocessing + missing-dep benchmarks report skipped so the suite stays green. Fast curated lane: swap run-all -> run-group --group math (or regex)."
tags = ["native", "benchmark-suite", "pyperformance"]
repeat = 3
timeout_sec = 1800
env = {}

[suite.runners.cpython]
json_stdout = true
run_cmd = ["uv", "run", "--isolated", "--no-project", "--python", "{python}", "--with", "pyperformance==1.14.0", "python", "{repo_root}/tools/pyperformance_adapter.py", "run-all", "--suite-root", "{suite_root}", "--rounds", "2", "--json"]

[suite.runners.molt]
skip_reason = "molt lane deferred: pyperformance._manifest must be importable under molt (open integration question, see the S1 adapter notes) + needs a build slot. The cpython lane (uv --with pyperformance==1.14.0) is the active reference; activate the molt lane once the import path is resolved (see bench/corpus/README.md)."
