schema_version = 1

[defaults]
repeat = 5
timeout_sec = 1800

# Friend suite records are intentionally disabled until:
# 1) repo_ref is pinned to an immutable commit/tag
# 2) runner commands are confirmed on your host
# 3) suite adapters (if needed) are implemented
#
# Semantic mode:
# - runs_unmodified
# - requires_adapter
# - unsupported_by_molt

[[suite]]
id = "codon_benchmarks"
enabled = true
friend = "codon"
display_name = "Codon Benchmarks"
source = "git"
repo_url = "https://github.com/exaloop/codon.git"
repo_ref = "9b72395ee453f21162b33b68fbf760763ec93ea0"   # Apache-2.0 (confirmed, not BUSL); 2026-06-22
semantic_mode = "requires_adapter"
adapter_notes = "Run unmodified Codon bench/codon kernels across cpython/codon (and, once verified, molt) lanes via tools/codon_adapter.py. The codon lane self-skips ('unavailable') when the codon compiler is absent (e.g. Windows), so the suite stays green on CPython-only hosts. Non-equivalent kernels (bignum/Unicode/C-semantics-numerics per 69A A.0.2) carry scored_against_codon=false and are reported, never scored. taq/word_count are data_gated until a pinned corpus is wired."
tags = ["native", "compiler", "microbench", "benchmark-suite"]
repeat = 5
timeout_sec = 1800

[suite.runners.cpython]
json_stdout = true
run_cmd = ["{python}", "{repo_root}/tools/codon_adapter.py", "--suite-root", "{suite_root}", "--lane", "cpython", "--kernel", "all", "--iterations", "5", "--json"]

[suite.runners.codon]
json_stdout = true
run_cmd = ["{python}", "{repo_root}/tools/codon_adapter.py", "--suite-root", "{suite_root}", "--lane", "codon", "--codon", "codon", "--kernel", "all", "--iterations", "5", "--json"]

[suite.runners.molt]
skip_reason = "molt lane deferred: needs a build slot + per-kernel verification that molt runs Codon's bench/codon kernels. Activate via tools/codon_adapter.py --lane molt --molt '{project_python} -m molt.cli' once verified (see bench/corpus/README.md)."

