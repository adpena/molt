# The Generator Manifest — the ONE authority for "what is a generated authority
# and how is it gated" (doc 59 §3 F1/F5; the semantic fact plane meta-gate).
#
# Consumed by `tools/check_generator_manifest.py --check` (the meta-gate) and
# cross-referenced by `tools/structural_audit.py` for the authoritative
# generated-file list (replacing the `_is_generated` heuristic — an authority
# replaces a heuristic, doc 46 rule #1).
#
# This file makes three classes of structural failure machine-checkable:
#   1. a `@generated` / DO-NOT-EDIT file with no committed, registered generator
#      (an "orphan generated file" — structural debt by the project's own
#      definition, gen_protocol.py:25);
#   2. a generator that is not CI `--check`-gated (so its output can drift
#      silently between regenerations);
#   3. a `match` over a CLOSED enum domain (OpCode, Terminator, …) that silently
#      defaults or misses an arm — the dispatch-handler-mirror-hazard bug class
#      that has bitten main (e.g. an arm ⊄ HANDLED_KINDS loud-panic).
#
# Every `[[generator]]` row is one generated authority. Every `[[closed_domain]]`
# row is one enum whose hand-written matches must be exhaustive-or-audited. Every
# `[[orphan_generated]]` row is a generated, committed file whose producer is NOT
# a `tools/gen_*.py` script (e.g. a Rust build-side generator), allowlisted so it
# is not mistaken for an orphan.
#
# === The add-a-fact / add-a-generator workflow (doc 59 §5) ===================
# When you add a new `gen_*.py`:
#   1. add a [[generator]] row (tool, outputs, source);
#   2. give it a `--check` flag and set check_mode = true;
#   3. wire a CI `--check` step UNLESS its source is not reproducible in a vanilla
#      CI checkout (live interpreters, an external/gitignored corpus); in that
#      case set ci_checkable = false and record ci_skip_reason;
#   4. prove idempotence (gen-twice byte-identical) and set idempotent = true;
#   5. add a byte-equality sync test and set sync_test, OR record sync_test_reason
#      if byte-identity is not the gate (e.g. an import-only Protocol shim);
#   6. if it renders an exhaustive match over a Rust enum, add the enum to
#      `closed_domains` AND a matching [[closed_domain]] row.
# The meta-gate enforces 2/3/4/5; rustc + the closed-domain auditor enforce 6.
#
# Field contract (per [[generator]] row):
#   check_mode      bool  — the generator supports `--check`. MUST be true for a
#                           non-discovery authority (the meta-gate fails otherwise).
#   ci_checkable    bool  — default true. false ⇒ the source is not reproducible
#                           in a vanilla CI checkout; ci_skip_reason is REQUIRED
#                           and the gate does not demand a ci.yml --check step.
#   ci_skip_reason  str   — REQUIRED iff ci_checkable = false. The auditable
#                           justification (never a silent exemption).
#   idempotent      bool  — gen-twice is byte-identical (the meta-gate proves it
#                           with --check-idempotence when ci_checkable).
#   sync_test       str   — the pytest pinning the output, or
#   sync_test_reason str  — why byte-identity is not the gate.

schema_version = 1

# Repo-relative source roots scanned for orphan `@generated` files. Mirrors
# tools/structural_audit.py _SOURCE_ROOTS so the two authorities agree.
generated_scan_roots = ["runtime", "src", "tools"]

