# ===========================================================================
# Closed domains — the enums whose hand-written matches MUST be exhaustive or
# carry an explicitly-audited default (doc 59 §3 F2). For each, the auditor:
#   (i)  parses the live enum to get the authoritative variant set;
#   (ii) scans every hand-written `match`/`matches!` over that domain in the
#        owned source roots and proves each either covers all variants, OR has a
#        top-level default that is fail-loud (panic/Err/unreachable — fail-CLOSED,
#        the correct dispatch pattern) or is explicitly listed in audited_defaults.
# The generated authority that renders each domain is also re-checked: its render
# must have no wildcard arm (rustc then refuses an unclassified variant — the
# authority, vs. the parser which is only discovery; doc 59 §3 F2 firewall).
# ===========================================================================

[[closed_domain]]
name = "OpCode"
enum_file = "runtime/molt-ir/src/tir/ops.rs"
enum_name = "OpCode"
# The generator that renders this domain exhaustively (no-wildcard match), and
# the table that drives that render.
owned_by = "tools/gen_op_kinds.py"
source_table = "runtime/molt-ir/src/tir/op_kinds.toml"
# Sites with a deliberate top-level `_ =>` that is NOT a missed classification.
# Each must be justified. (Empty: every silent-default OpCode classifier was
# migrated to a generated predicate — doc 59 Phase 4 ratchet at 0.)
audited_defaults = []

[[closed_domain]]
name = "Terminator"
enum_file = "runtime/molt-ir/src/tir/blocks.rs"
enum_name = "Terminator"
owned_by = "tools/gen_op_kinds.py"
source_table = "runtime/molt-ir/src/tir/op_kinds.toml"
audited_defaults = []

# ===========================================================================
# Orphan-generated allowlist — generated, committed files whose producer is NOT
# a tools/gen_*.py script. Without this, the orphan scan would false-flag them.
# Each row names the real producer so the file stays accountable.
# ===========================================================================

[[orphan_generated]]
path = "runtime/molt-ffi/src/header.rs"
producer = "molt-ffi crate (Rust build-side generator)"
reason = "emitted by the molt-ffi crate's own codegen, not a tools/ generator; checked in for the C ABI header"
