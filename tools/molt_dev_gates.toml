# molt_dev_gates.toml — the change-class -> required-gates manifest.
#
# Consumed by tools/molt_dev.py `integrate` (hazard 10): the set of touched
# paths in the commits being integrated is matched against each rule's `globs`;
# a rule matches when ANY touched path matches ANY of its globs, and its `gates`
# are added to the run. `always` gates run for every non-empty change. Gates are
# de-duplicated preserving first-seen order, so a gate listed by two rules runs
# once. `integrate --extra-gate` appends arc-specific gates.
#
# This is the canonical mapping rustc's x.py / Go's dist embody: a change's
# class determines exactly which checks must be green BEFORE push. It is NOT a
# replacement for review — it is the floor of mechanical verification.
#
# Gate command strings mirror tools' canonical invocations in
# pyproject.toml [tool.molt.dx.commands]. They run with shell=True, cwd=<repo>,
# MOLT_SESSION_ID + PYTHONPATH=src exported. A gate's non-zero exit halts the
# integration before push.
#
# DELIBERATELY: heavy cargo gates (clippy/build/test) are listed for the rules
# whose change-class needs them. Under host contention an operator may run with
# --no-gates and gate out-of-band, but the DEFAULT is full mechanical coverage.
#
# require_fresh_toolchain = true on a rule makes `integrate` additionally
# demand a fresh built binary (hazard 6) when --toolchain-binary is supplied —
# so a Rust change is never integrated against a stale artifact's gate result.

# Gates that run for ANY non-empty change: the cheap Python contracts that must
# never regress regardless of what was touched.
always = [
  "python3 tools/venv_exec.py python -m ruff check .",
  "python3 tools/venv_exec.py python -m ruff format --check .",
]

# --- Native (Cranelift) backend Rust -------------------------------------
[[rule]]
name = "backend-native"
description = "Cranelift/native backend Rust: clippy + backend lib tests, fresh binary."
require_fresh_toolchain = true
globs = [
  "runtime/molt-backend/**/*.rs",
  "runtime/molt-backend/**/Cargo.toml",
]
gates = [
  "cargo clippy -p molt-backend --features native-backend -- -D warnings",
  "cargo test --profile release-fast -p molt-backend --features native-backend --lib",
]

# --- LLVM backend Rust (adds the +llvm lib test lane) --------------------
[[rule]]
name = "backend-llvm"
description = "LLVM backend Rust: clippy + LLVM-feature lib tests."
require_fresh_toolchain = true
globs = [
  "runtime/molt-backend/src/llvm*/**/*.rs",
  "runtime/molt-backend/src/**/llvm*.rs",
]
gates = [
  "cargo test --profile release-fast -p molt-backend --features \"native-backend llvm\" --lib",
]

# --- TIR midend Rust ------------------------------------------------------
[[rule]]
name = "tir-midend"
description = "TIR midend Rust: all-target clippy + feature-complete tests."
require_fresh_toolchain = true
globs = [
  "runtime/molt-ir/**/*.rs",
  "runtime/molt-ir/**/*.toml",
  "runtime/molt-ir/Cargo.toml",
  "runtime/molt-passes/**/*.rs",
  "runtime/molt-passes/**/*.toml",
  "runtime/molt-passes/Cargo.toml",
  "runtime/molt-tir/**/*.rs",
  "runtime/molt-tir/**/*.toml",
  "runtime/molt-tir/Cargo.toml",
]
gates = [
  "cargo clippy -p molt-passes --all-targets --all-features -- -D warnings",
  "cargo test -p molt-passes --all-features",
  "cargo clippy -p molt-tir --all-targets --all-features -- -D warnings",
  "cargo test -p molt-tir --all-features",
]

# --- WASM host Rust -------------------------------------------------------
[[rule]]
name = "wasm-host"
description = "Wasmtime host Rust: warning-free clippy + release-fast link build."
require_fresh_toolchain = true
globs = [
  "runtime/molt-wasm-host/**/*.rs",
  "runtime/molt-wasm-host/**/*.toml",
  "runtime/molt-wasm-host/Cargo.toml",
]
gates = [
  "cargo clippy -p molt-wasm-host -- -D warnings",
  "cargo build --profile release-fast -p molt-wasm-host",
]

# --- Runtime crate Rust (object model / runtime library) -----------------
[[rule]]
name = "runtime-lib"
description = "Runtime/object-model Rust: runtime lib tests + clippy, fresh binary."
require_fresh_toolchain = true
globs = [
  "runtime/molt-runtime/**/*.rs",
  "runtime/molt-obj-model/**/*.rs",
  "runtime/**/Cargo.toml",
]
gates = [
  "cargo test --profile release-fast -p molt-runtime --lib",
  # Mirror CI (ci.yml:159): lib-scoped clippy. --all-targets pulls in the
  # documented pre-existing TEST-target debt (38+9 errors) — adding it is the
  # clippy-test-debt ratchet arc, not this manifest's job.
  "cargo clippy -p molt-backend --features native-backend -- -D warnings",
  # NOTE: molt-runtime lib has 32 pre-existing clippy warnings (documented
  # baseline); CI does not -D-warnings-gate it. The runtime-clippy ratchet arc
  # = clear the 32, then add the gate here + CI in one change.
]

# --- Frontend / stdlib Python (bootstrap-critical) -----------------------
[[rule]]
name = "frontend-python"
description = "Frontend lowering / stdlib Python: type check + verified-subset + dynamic policy."
globs = [
  "src/molt/**/*.py",
]
gates = [
  # ty static type check (ratchet cleared 2026-06: the 16 pre-existing
  # diagnostics are fixed and this gate now enforces zero). Mirrors the
  # pre-commit `ty` hook and ci.yml docs-gates `ty check src` step.
  "python3 tools/venv_exec.py python -m ty check src",
  "python3 tools/verified_subset.py check",
  "python3 tools/check_dynamic_policy.py",
]

# --- Bootstrap-critical stdlib modules (extra intrinsic audits) ----------
[[rule]]
name = "bootstrap-stdlib"
description = "builtins/sys/importlib/_intrinsics: stdlib-intrinsic audits (Bootstrap Authority)."
globs = [
  "src/molt/stdlib/builtins.py",
  "src/molt/stdlib/sys.py",
  "src/molt/stdlib/_sys_impl.py",
  "src/molt/stdlib/importlib/**/*.py",
  "src/molt/stdlib/_intrinsics.py",
]
gates = [
  "python3 tools/check_stdlib_intrinsics.py --fallback-intrinsic-backed-only",
  "python3 tools/check_stdlib_intrinsics.py --critical-allowlist",
]

# --- Op-kind registry (generated files + emitter/registry drift) ---------
[[rule]]
name = "op-kind-registry"
description = "Op-kind registry: generated-file sync + down-only emitter/registry drift."
globs = [
  "tools/gen_op_kinds.py",
  "tools/audit_op_kinds.py",
  "tools/op_kinds/**/*.py",
  "runtime/molt-ir/src/tir/op_kinds.toml",
  "runtime/molt-ir/src/tir/op_kinds_generated.rs",
  "runtime/molt-backend/src/**/op_kind*.rs",
  "runtime/molt-backend/src/**/ops*.rs",
]
gates = [
  "python3 tools/gen_op_kinds.py --check",
  "python3 tools/audit_op_kinds.py --check",
]

# --- tinygrad GPU op-contract fact (pin + generated op_contract.toml) -----
[[rule]]
name = "tinygrad-op-contract"
description = "tinygrad ML op-contract FACT: pin freshness + generated op_contract.toml sync (doc 67 Phase 0/1)."
globs = [
  "tools/check_tinygrad_pin.py",
  "tools/gen_gpu_op_contract.py",
  "docs/spec/tinygrad_pin.md",
  "runtime/molt-gpu/op_contract.toml",
  "runtime/molt-gpu/src/ops.rs",
  "tests/test_gen_gpu_op_contract.py",
  # The pinned upstream oracle: re-vendoring tinygrad must re-prove the pin +
  # regenerate the contract (the bump protocol in docs/spec/tinygrad_pin.md).
  "bench/friends/repos/tinygrad_off_the_shelf/pyproject.toml",
  "bench/friends/repos/tinygrad_off_the_shelf/tinygrad/uop/__init__.py",
  "bench/friends/repos/tinygrad_off_the_shelf/tinygrad/renderer/cstyle.py",
]
gates = [
  "python3 tools/check_tinygrad_pin.py --check",
  "python3 tools/gen_gpu_op_contract.py --check",
  "python3 -m pytest -q tests/test_gen_gpu_op_contract.py",
]

# --- Intrinsic registry (manifest/category/generated resolver sync) -------
[[rule]]
name = "intrinsic-registry"
description = "Intrinsic registry: manifest/category sync + generated resolver ownership."
globs = [
  "tools/gen_intrinsics.py",
  "src/molt/_intrinsics.pyi",
  "src/molt/_runtime_feature_gates.py",
  "runtime/molt-runtime/src/intrinsics/manifest.pyi",
  "runtime/molt-runtime/src/intrinsics/categories.toml",
  "runtime/molt-runtime/src/intrinsics/generated.rs",
  "runtime/molt-runtime/src/intrinsics/generated_resolvers/**/*.rs",
  "runtime/molt-runtime-stringprep/src/intrinsics_generated.rs",
  "tests/test_gen_intrinsics.py",
]
gates = [
  "python3 tools/gen_intrinsics.py --check",
  "python3 -m pytest -q tests/test_gen_intrinsics.py",
]

# --- Codec generated tables ----------------------------------------------
[[rule]]
name = "codec-tables"
description = "Text codec registry and generated single-byte charmap tables."
globs = [
  "tools/gen_codecs.py",
  "runtime/molt-runtime-text/src/codec_registry.rs",
  "runtime/molt-runtime-text/src/charmap_codecs_generated.rs",
  "runtime/molt-runtime-text/src/codec_aliases_generated.rs",
  "src/molt/stdlib/encodings/*.py",
  "tests/test_gen_codecs.py",
]
gates = [
  "python3 tools/gen_codecs.py --check",
  "python3 -m pytest -q tests/test_gen_codecs.py",
]

# --- StringPrep runtime leaf crate ---------------------------------------
[[rule]]
name = "stringprep-leaf"
description = "StringPrep Rust leaf crate: build health for extracted runtime code."
globs = [
  "runtime/molt-runtime-stringprep/**/*.rs",
  "runtime/molt-runtime-stringprep/Cargo.toml",
]
gates = [
  "cargo check --manifest-path runtime/Cargo.toml -p molt-runtime-stringprep --lib",
]

# --- StringPrep generated tables -----------------------------------------
[[rule]]
name = "stringprep-tables"
description = "StringPrep generated Rust tables: generated-file sync."
globs = [
  "tools/gen_stringprep_tables.py",
  "runtime/molt-runtime-stringprep/src/tables.rs",
  "tests/test_gen_stringprep_tables.py",
]
gates = [
  "python3 tools/gen_stringprep_tables.py --check",
  "python3 -m pytest -q tests/test_gen_stringprep_tables.py",
]

# --- LLVM runtime ABI authority ------------------------------------------
[[rule]]
name = "llvm-runtime-abi"
description = "LLVM preserved runtime calls: availability is not ABI authority."
globs = [
  "tools/llvm_runtime_abi_audit.py",
  "tests/test_llvm_runtime_abi_audit.py",
  "src/molt/frontend/lowering/serialization.py",
  "runtime/molt-ir/src/tir/op_kinds_generated.rs",
  "runtime/molt-backend/src/llvm_backend/lowering.rs",
  "runtime/molt-backend/src/llvm_backend/runtime_imports.rs",
  "runtime/molt-runtime/src/**/*.rs",
]
gates = [
  "python3 tools/llvm_runtime_abi_audit.py --check",
  "python3 -m pytest -q tests/test_llvm_runtime_abi_audit.py",
]

# --- Differential / suite-honesty surface --------------------------------
[[rule]]
name = "suite-honesty"
description = "Differential tests or the honesty manifest: suite-layout hygiene + the down-only suite-honesty ratchet."
globs = [
  "tests/differential/**/*.py",
  "tools/suite_honesty/**",
  "tools/check_suite_honesty.py",
  "tools/check_differential_suite_layout.py",
]
gates = [
  # Lane/naming hygiene: no unexpected lane dirs, no stdlib-prefixed basic
  # files (no `test_`-prefixed differential tests), live allowlist ledger.
  "python3 tools/check_differential_suite_layout.py",
  "python3 tools/check_suite_honesty.py",
]

# --- Ecosystem-compat ratchet --------------------------------------------
[[rule]]
name = "ecosystem-compat"
description = "Dynamism-feature taxonomy or package triage: the down-only ecosystem ratchet."
globs = [
  "tools/ecosystem/**",
  "tools/check_ecosystem_compat.py",
]
gates = [
  "python3 tools/check_ecosystem_compat.py",
]

# --- tinygrad static exec registry ---------------------------------------
[[rule]]
name = "tinygrad-upat-static-exec-registry"
description = "tinygrad UPat matcher static exec registry: fail-closed generated factory contract."
globs = [
  "tools/tinygrad_upat_static_exec_registry.py",
  "tests/tools/test_tinygrad_upat_static_exec_registry.py",
]
gates = [
  "uv run python -m pytest -q tests/tools/test_tinygrad_upat_static_exec_registry.py",
]

# --- Docs architecture / generated status blocks -------------------------
[[rule]]
name = "docs-architecture"
description = "Docs/spec or status-block generators: the docs-architecture contract."
globs = [
  "docs/**/*.md",
  "tools/update_status_blocks.py",
  "tools/check_docs_architecture.py",
]
gates = [
  "python3 tools/update_status_blocks.py --check",
  "python3 tools/check_docs_architecture.py",
]

# --- The dev tooling itself (self-gate: its own failure-mode tests) ------
[[rule]]
name = "dev-tooling"
description = "tools/molt_dev.py or its config/tests: run the driver's own failure-mode tests."
globs = [
  "tools/molt_dev.py",
  "tools/molt_dev_gates.toml",
  "tests/test_molt_dev.py",
]
gates = [
  "python3 tools/venv_exec.py python -m pytest -q tests/test_molt_dev.py",
]

# --- CI workflow / pyproject lint wiring ---------------------------------
[[rule]]
name = "ci-wiring"
description = "CI workflows or pyproject: the CI-topology contract test."
globs = [
  ".github/workflows/**",
  "pyproject.toml",
]
gates = [
  "python3 tools/venv_exec.py python -m pytest -q tests/test_ci_workflow_topology.py",
]
