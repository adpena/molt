repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
      - id: ty
        name: ty
        entry: uv run ty check src
        language: system
        pass_filenames: false
      - id: secret-guard
        name: secret guard
        entry: uv run python3 tools/secret_guard.py --staged
        language: system
        pass_filenames: false
      - id: staged-whitespace-check
        name: staged whitespace check
        entry: git diff --cached --check
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
