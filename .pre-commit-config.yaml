repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
      - id: ruff-format
        args: ["--check"]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check src
        language: system
        pass_filenames: false
      - id: staged-whitespace-check
        name: staged whitespace check
        entry: git diff --cached --check
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
