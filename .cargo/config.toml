# Molt Cargo configuration
# Portable baseline: no target-cpu=native by default.
# For host-tuned builds, use .cargo/config-native.toml or set MOLT_NATIVE_CPU=1.

[target.'cfg(not(target_arch = "wasm32"))']
rustflags = []

# Keep the shared repo baseline portable. Fast Linux linkers should be opted into
# locally instead of hard-coding a clang+mold requirement into every Cargo build.
[target.x86_64-unknown-linux-gnu]
rustflags = []

[target.aarch64-unknown-linux-gnu]
rustflags = []

# WASM targets use a fixed feature set — do NOT set target-cpu=native.
# The wasm32-unknown-unknown and wasm32-wasi targets use Cranelift's
# default feature baseline.
