# Molt Cargo configuration
# Portable baseline: no target-cpu=native by default.
#
# Opt-in to host-tuned builds (non-portable!):
#   CARGO_BUILD_RUSTFLAGS="-C target-cpu=native" cargo build ...
# Or copy .cargo/config-native.toml over this file for persistent opt-in.

[target.'cfg(not(target_arch = "wasm32"))']
rustflags = []

# Keep the shared repo baseline portable. Fast Linux linkers (mold, lld)
# should be opted into locally rather than hard-coded here.
# To opt-in to mold on Linux:
#   [target.x86_64-unknown-linux-gnu]
#   linker = "clang"
#   rustflags = ["-C", "link-arg=-fuse-ld=mold"]
[target.x86_64-unknown-linux-gnu]
rustflags = []

[target.aarch64-unknown-linux-gnu]
rustflags = []

# WASM targets use a fixed feature set — do NOT set target-cpu=native.
# Disable reference-types so LLVM 19+ (Rust 1.94+) does NOT emit GC-proposal
# rec groups or `exact` heap types.  These features are rejected by Cloudflare
# Workers' V8 runtime and by wasm-opt without --all-features.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=-reference-types"]

[target.wasm32-wasip1]
rustflags = ["-C", "target-feature=-reference-types"]

[target.wasm32-wasi]
rustflags = ["-C", "target-feature=-reference-types"]
