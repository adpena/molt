[package]
name = "simd-ops"
version = "0.1.0"
edition = "2021"
description = "WASM SIMD vectorized ops for Falcon-OCR inference (Rust source)"

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = "z"      # Size-optimized parity artifact; hot variants need their own lane.
lto = true
codegen-units = 1
panic = "abort"
strip = true
