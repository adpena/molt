[package]
name = "simd-ops"
version = "0.1.0"
edition = "2021"
description = "WASM SIMD vectorized ops for Falcon-OCR inference (Rust source)"

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = 2        # Speed-optimized for SIMD matmul (~10.5 us 64x64)
lto = true
codegen-units = 1
panic = "abort"
strip = true
