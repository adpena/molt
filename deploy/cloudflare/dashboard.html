<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Falcon-OCR Dashboard</title>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: #e0e0e0; padding: 20px; max-width: 900px; margin: 0 auto; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin: 12px 0; }
        .status-ok { color: #4ade80; }
        .status-warn { color: #fbbf24; }
        .status-err { color: #f87171; }
        .metric { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .metric:last-child { border: none; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.1rem; color: #999; margin-top: 0; }
        #last-update { color: #666; font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Falcon-OCR <span id="status-badge">&#9679;</span></h1>
    <p id="last-update">Loading...</p>

    <div class="grid">
        <div class="card">
            <h2>Model</h2>
            <div id="model-info">&mdash;</div>
        </div>
        <div class="card">
            <h2>Performance</h2>
            <div id="perf-info">&mdash;</div>
        </div>
    </div>

    <div class="card">
        <h2>Endpoints</h2>
        <div id="endpoints">&mdash;</div>
    </div>

    <div class="card">
        <h2>Assets (R2)</h2>
        <div id="assets">&mdash;</div>
    </div>

    <script>
        const BASE = location.origin;

        async function refresh() {
            try {
                const r = await fetch(`${BASE}/health`, { headers: { Origin: 'https://freeinvoicemaker.app' } });
                const d = await r.json();

                document.getElementById('status-badge').className = d.status === 'ready' ? 'status-ok' : 'status-warn';
                document.getElementById('last-update').textContent = `Last update: ${new Date().toLocaleTimeString()}`;

                document.getElementById('model-info').innerHTML = `
                    <div class="metric"><span>Status</span><span class="${d.status === 'ready' ? 'status-ok' : 'status-warn'}">${d.status}</span></div>
                    <div class="metric"><span>Variant</span><span>${d.model_variant || '&mdash;'}</span></div>
                    <div class="metric"><span>Device</span><span>${d.device || '&mdash;'}</span></div>
                    <div class="metric"><span>WASM</span><span>${d.wasm_available ? 'yes' : 'no'}</span></div>
                `;

                const a = d.analytics || {};
                document.getElementById('perf-info').innerHTML = `
                    <div class="metric"><span>Requests/min</span><span>${a.requests_per_minute || 0}</span></div>
                    <div class="metric"><span>Error rate</span><span>${(a.error_rate || 0).toFixed(1)}%</span></div>
                    <div class="metric"><span>Cache hit</span><span>${(a.cache_hit_ratio || 0).toFixed(0)}%</span></div>
                    <div class="metric"><span>p95 latency</span><span>${a.latency?.p95_ms || 0}ms</span></div>
                `;
            } catch (e) {
                document.getElementById('status-badge').className = 'status-err';
                document.getElementById('last-update').textContent = `Error: ${e.message}`;
            }
        }

        async function checkAssets() {
            const assets = [
                { name: 'WASM binary', url: '/wasm/falcon-ocr.wasm' },
                { name: 'INT8 config', url: '/weights/falcon-ocr-int8/config.json' },
                { name: 'Compute engine', url: '/browser/compute-engine.js' },
                { name: 'SIMD (Rust)', url: '/browser/simd-ops.wasm' },
                { name: 'SIMD (Zig)', url: '/browser/simd-ops-zig.wasm' },
            ];
            let html = '';
            for (const a of assets) {
                try {
                    const r = await fetch(`${BASE}${a.url}`, { method: 'HEAD', headers: { Origin: 'https://freeinvoicemaker.app' } });
                    const size = parseInt(r.headers.get('content-length') || '0');
                    const sizeStr = size > 1e6 ? `${(size/1e6).toFixed(1)} MB` : `${(size/1e3).toFixed(1)} KB`;
                    html += `<div class="metric"><span>${a.name}</span><span class="${r.ok ? 'status-ok' : 'status-err'}">${r.ok ? sizeStr : r.status}</span></div>`;
                } catch { html += `<div class="metric"><span>${a.name}</span><span class="status-err">Error</span></div>`; }
            }
            document.getElementById('assets').innerHTML = html;
        }

        async function checkEndpoints() {
            const eps = [
                { name: 'Health', method: 'GET', path: '/health' },
                { name: 'Test page', method: 'GET', path: '/test' },
                { name: 'NL Fill', method: 'POST', path: '/invoice/fill', body: '{"utterance":"test"}' },
            ];
            let html = '';
            for (const ep of eps) {
                try {
                    const opts = { method: ep.method, headers: { Origin: 'https://freeinvoicemaker.app' } };
                    if (ep.body) { opts.headers['Content-Type'] = 'application/json'; opts.body = ep.body; }
                    const start = performance.now();
                    const r = await fetch(`${BASE}${ep.path}`, opts);
                    const ms = Math.round(performance.now() - start);
                    html += `<div class="metric"><span>${ep.name}</span><span class="${r.ok ? 'status-ok' : 'status-warn'}">${r.status} (${ms}ms)</span></div>`;
                } catch { html += `<div class="metric"><span>${ep.name}</span><span class="status-err">Error</span></div>`; }
            }
            document.getElementById('endpoints').innerHTML = html;
        }

        refresh();
        checkAssets();
        checkEndpoints();
        setInterval(refresh, 30000);
    </script>
</body>
</html>
