# Cloudflare Worker configuration for Falcon-OCR inference.
#
# This Worker loads the molt-compiled WASM module, fetches weights from
# R2, and serves OCR requests over a REST API.
#
# Deploy: wrangler deploy --config deploy/cloudflare/wrangler.toml

name = "falcon-ocr"
main = "worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: colocate with R2 bucket to minimize weight-fetch latency.
[placement]
mode = "smart"

# R2 binding for weight storage.  Weights are NOT bundled in the Worker
# (they exceed the 10 MB Worker size limit).  The Worker fetches them
# from R2 on cold start and caches the initialized model in-memory.
[[r2_buckets]]
binding = "WEIGHTS"
bucket_name = "falcon-ocr-weights"

# KV binding for caching compiled WASM modules and config.
[[kv_namespaces]]
binding = "CACHE"
id = "791309f66ab445e8a0327a34206f7005"

# Workers AI binding for GPU-accelerated OCR inference.
# When available, the Worker uses vision models (Gemma 4, Llama 3.2 Vision)
# for OCR instead of local CPU inference.  This provides:
#   - Zero CPU cost on the Worker (inference runs on Cloudflare's GPU fleet)
#   - No model loading or memory pressure
#   - Higher quality (larger models than can fit in Worker memory)
[ai]
binding = "AI"

[vars]
# Public vars — secrets go via `wrangler secret put`.
CORS_ORIGIN = "https://freeinvoicemaker.app"
MAX_IMAGE_BYTES = "10485760"
MODEL_VERSION = "0.1.0"

# Secrets (set via `wrangler secret put`):
# X402_WALLET_ADDRESS — wallet for x402 payment verification
# X402_VERIFICATION_URL — x402 verification endpoint

# Durable Object for persistent model state.
# The DO loads the model ONCE and keeps it in memory across requests,
# eliminating cold-start latency for repeat callers.
[durable_objects]
bindings = [
    { name = "FALCON_OCR", class_name = "FalconOCRInference" }
]

[[migrations]]
tag = "v1"
new_classes = ["FalconOCRInference"]

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 0.1

# Limits — Falcon-OCR inference is compute-heavy.
# Workers Paid plan supports up to 256 MB memory with explicit limits config.
# INT4 quantized model is ~129 MB; needs headroom for JS runtime + activations.
[limits]
cpu_ms = 300000  # 5 minutes — Workers Paid plan maximum
memory_mb = 256

# ---------------------------------------------------------------------------
# Cloudflare Containers — Falcon-OCR self-hosted inference
#
# As of GA (2026-04-13), Cloudflare Containers do NOT expose GPUs to
# customers. GPU hardware is reserved for Workers AI internally.
# Instance types are CPU-only: lite (1/16 vCPU, 256 MiB), basic (1/4 vCPU,
# 1 GiB), standard-1..4 (up to 4 vCPU, 12 GiB).
#
# The Falcon-OCR Docker image (ghcr.io/tiiuae/falcon-ocr:latest) requires
# GPU for real-time inference.  On CPU-only Containers it would be too slow
# for production use (minutes per page vs. sub-second on GPU).
#
# BLOCKED: Do not deploy until Cloudflare ships customer-facing GPU
# containers.  Until then, the Worker routes inference through Workers AI
# (see [ai] binding above) which runs on Cloudflare's internal GPU fleet.
#
# Alternative GPU hosting options for the Docker image:
#   - Fly.io GPU Machines: A100/H100, $2.50/hr, deploy with fly deploy
#   - Modal:               A100/H100, per-second billing, modal deploy
#   - Replicate:           Push Docker image as a Cog model, pay per prediction
#   - RunPod:              A100/H100/4090, $0.44/hr+, serverless or pods
#
# When CF GPU containers ship, uncomment the block below and add a
# durable_objects binding + migration for FalconOCRContainer.
# ---------------------------------------------------------------------------
