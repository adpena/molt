name: Molt WASM CI

on:
  push:
    branches: [ main ]
    paths:
      - 'runtime/**'
      - 'src/**'
      - 'tests/test_wasm_*.py'
      - 'tests/wasm_harness.py'
      - 'tests/wasm_linked_runner.py'
      - 'examples/*.py'
      - '.github/workflows/molt-wasm-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'runtime/**'
      - 'src/**'
      - 'tests/test_wasm_*.py'
      - 'tests/wasm_harness.py'
      - 'tests/wasm_linked_runner.py'
      - 'examples/*.py'
      - '.github/workflows/molt-wasm-ci.yml'

permissions:
  contents: read

jobs:
  wasm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}/src
      MOLT_EXT_ROOT: /tmp/molt-ext
      CARGO_TARGET_DIR: /tmp/molt-ext/cargo-target
      MOLT_DIFF_CARGO_TARGET_DIR: /tmp/molt-ext/cargo-target
      MOLT_BACKEND_DAEMON_SOCKET_DIR: /tmp/molt_backend_sockets
    steps:
      - uses: actions/checkout@v4

      - name: Prepare portable artifact root
        run: |
          mkdir -p /tmp/molt-ext/tmp
          mkdir -p /tmp/molt-ext/diff
          mkdir -p /tmp/molt-ext/molt_cache
          mkdir -p /tmp/molt-ext/uv-cache
          mkdir -p /tmp/molt-ext/cargo-target

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --python 3.12

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install native and wasm linkers
        run: |
          if ! command -v mold >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y mold
          fi
          if ! command -v wasm-ld >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y lld
          fi
          mold --version
          wasm-ld --version

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Molt backend
        run: cargo build --release --manifest-path runtime/molt-backend/Cargo.toml

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      # ── WASM target: hello.py (class + arithmetic) ──
      - name: Compile hello.py to WASM
        run: |
          uv run --python 3.12 python3 -m molt.cli build \
            examples/hello.py --target wasm --output /tmp/test_hello.wasm
        env:
          RUSTC_WRAPPER: ""

      - name: Validate hello.wasm is non-zero
        run: |
          WASM_SIZE=$(stat --format=%s /tmp/test_hello.wasm)
          echo "WASM size: ${WASM_SIZE} bytes"
          if [ "$WASM_SIZE" -lt 100 ]; then
            echo "ERROR: WASM output is suspiciously small (${WASM_SIZE} bytes)"
            exit 1
          fi

      - name: Run hello.wasm with wasmtime
        run: wasmtime run /tmp/test_hello.wasm

      # ── WASM target: comprehension_fail.py (list comprehension regression gate) ──
      - name: Compile comprehension_fail.py to WASM
        run: |
          uv run --python 3.12 python3 -m molt.cli build \
            examples/comprehension_fail.py --target wasm --output /tmp/test_comprehension.wasm
        env:
          RUSTC_WRAPPER: ""

      - name: Validate comprehension.wasm is non-zero
        run: |
          WASM_SIZE=$(stat --format=%s /tmp/test_comprehension.wasm)
          echo "WASM size: ${WASM_SIZE} bytes"
          if [ "$WASM_SIZE" -lt 100 ]; then
            echo "ERROR: WASM output is suspiciously small (${WASM_SIZE} bytes)"
            exit 1
          fi

      - name: Run comprehension.wasm with wasmtime
        run: wasmtime run /tmp/test_comprehension.wasm

      # ── Luau target: hello.py ──
      - name: Compile hello.py to Luau
        run: |
          uv run --python 3.12 python3 -m molt.cli build \
            examples/hello.py --target luau --output /tmp/test_hello.luau
        env:
          RUSTC_WRAPPER: ""

      - name: Validate hello.luau is non-zero
        run: |
          LUAU_SIZE=$(stat --format=%s /tmp/test_hello.luau)
          echo "Luau size: ${LUAU_SIZE} bytes"
          if [ "$LUAU_SIZE" -lt 10 ]; then
            echo "ERROR: Luau output is suspiciously small (${LUAU_SIZE} bytes)"
            exit 1
          fi

      # ── Luau target: comprehension_fail.py (comprehension regression gate) ──
      - name: Compile comprehension_fail.py to Luau
        run: |
          uv run --python 3.12 python3 -m molt.cli build \
            examples/comprehension_fail.py --target luau --output /tmp/test_comprehension.luau
        env:
          RUSTC_WRAPPER: ""

      - name: Validate comprehension.luau is non-zero
        run: |
          LUAU_SIZE=$(stat --format=%s /tmp/test_comprehension.luau)
          echo "Luau size: ${LUAU_SIZE} bytes"
          if [ "$LUAU_SIZE" -lt 10 ]; then
            echo "ERROR: Luau output is suspiciously small (${LUAU_SIZE} bytes)"
            exit 1
          fi

      # ── WASM target: sieve benchmark (arithmetic + loops + list ops) ──
      - name: Compile sieve_bench.py to WASM
        run: |
          cat > /tmp/sieve_bench.py << 'PYEOF'
          def sieve(n):
              is_prime = [True] * (n + 1)
              is_prime[0] = is_prime[1] = False
              p = 2
              while p * p <= n:
                  if is_prime[p]:
                      for i in range(p * p, n + 1, p):
                          is_prime[i] = False
                  p += 1
              return sum(1 for x in is_prime if x)
          count = sieve(10000)
          assert count == 1229, f"Expected 1229 primes, got {count}"
          print(f"Sieve(10000) = {count} primes")
          PYEOF
          uv run --python 3.12 python3 -m molt.cli build \
            /tmp/sieve_bench.py --target wasm --output /tmp/test_sieve.wasm
        env:
          RUSTC_WRAPPER: ""

      - name: Run sieve.wasm with wasmtime
        run: wasmtime run /tmp/test_sieve.wasm

      # ── WASM parity tests (pytest) ──
      - name: Run WASM control flow parity tests
        run: uv run pytest tests/test_wasm_control_flow.py -q

      # ── Summary ──
      - name: Build summary
        if: always()
        run: |
          echo "=== WASM Build Summary ==="
          for f in /tmp/test_hello.wasm /tmp/test_comprehension.wasm /tmp/test_sieve.wasm /tmp/test_hello.luau /tmp/test_comprehension.luau; do
            if [ -f "$f" ]; then
              echo "  $(basename "$f"): $(stat --format=%s "$f") bytes"
            else
              echo "  $(basename "$f"): MISSING"
            fi
          done
