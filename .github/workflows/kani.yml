name: Kani verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  kani-verification:
    name: Kani bounded verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
      - name: Run NaN-boxing proofs
        run: |
          cd runtime/molt-obj-model && cargo kani --tests
      - name: Run runtime proofs
        run: |
          cd runtime/molt-runtime && cargo kani --tests
