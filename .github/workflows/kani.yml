name: Kani verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  kani-verification:
    name: Kani bounded verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
      - name: Install Kani
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo install --locked kani-verifier
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo kani setup
      - name: Run NaN-boxing proofs
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE --cwd runtime/molt-obj-model -- cargo kani --tests
      - name: Run runtime proofs
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE --cwd runtime/molt-runtime -- cargo kani --tests
