name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'formal/**'
      - 'runtime/molt-obj-model/src/lib.rs'
      - 'runtime/molt-backend/src/luau.rs'
      - 'tools/check_formal_methods.py'
      - '.github/workflows/formal.yml'
  pull_request:
    branches: [main]
    paths:
      - 'formal/**'
      - 'runtime/molt-obj-model/src/lib.rs'
      - 'runtime/molt-backend/src/luau.rs'
      - 'tools/check_formal_methods.py'
      - '.github/workflows/formal.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MOLT_QUINT_NPM_PACKAGE: "@informalsystems/quint@0.32.0"
  MOLT_QUINT_RUST_EVALUATOR_VERSION: "v0.6.0"
  MOLT_QUINT_RUST_EVALUATOR_ASSET: "quint_evaluator-x86_64-unknown-linux-gnu.tar.gz"
  MOLT_QUINT_RUST_EVALUATOR_SHA256: "61755a09d5052d93a4e75e840059edfd0d3674aeda164b9d2464be3d6e21b1c2"

jobs:
  formal-lean:
    name: Lean Proof Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean build
        uses: actions/cache@v5
        with:
          path: |
            formal/lean/.lake
            formal/lean/lake-packages
          key: lean-${{ runner.os }}-${{ hashFiles('formal/lean/lean-toolchain', 'formal/lean/lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Build proofs
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE --cwd formal/lean -- lake build
        timeout-minutes: 15

      - name: Check sorry count
        working-directory: formal/lean
        run: |
          SORRY_COUNT=$(grep -r "\bsorry\b" --include="*.lean" -l | wc -l | tr -d ' ')
          echo "Files with sorry: $SORRY_COUNT"
          BASELINE=$(cat SORRY_BASELINE | tr -d '[:space:]')
          echo "Baseline: $BASELINE"
          if [ "$SORRY_COUNT" -gt "$BASELINE" ]; then
            echo "::error::Sorry file count ($SORRY_COUNT) exceeds baseline ($BASELINE). Fix new sorry gaps or update SORRY_BASELINE."
            exit 1
          fi
          if [ "$SORRY_COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Sorry file count ($SORRY_COUNT) is below baseline ($BASELINE). Consider lowering SORRY_BASELINE."
          fi

  formal-quint:
    name: Quint Model Checking
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          check-latest: true

      - name: Install Quint
        run: npm install -g "$MOLT_QUINT_NPM_PACKAGE"

      - name: Install Quint Rust evaluator
        run: |
          set -euo pipefail
          evaluator_dir="$HOME/.quint/rust-evaluator-${MOLT_QUINT_RUST_EVALUATOR_VERSION}"
          asset_path="$RUNNER_TEMP/${MOLT_QUINT_RUST_EVALUATOR_ASSET}"
          mkdir -p "$evaluator_dir"
          curl --fail --location --show-error --silent --retry 5 --retry-delay 2 \
            "https://github.com/informalsystems/quint/releases/download/evaluator/${MOLT_QUINT_RUST_EVALUATOR_VERSION}/${MOLT_QUINT_RUST_EVALUATOR_ASSET}" \
            --output "$asset_path"
          echo "${MOLT_QUINT_RUST_EVALUATOR_SHA256}  ${asset_path}" | sha256sum --check
          tar -xzf "$asset_path" -C "$evaluator_dir"
          chmod +x "$evaluator_dir/quint_evaluator"
          "$evaluator_dir/quint_evaluator" --help >/dev/null

      - name: Verify all models
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- python3 tools/check_formal_methods.py --quint-only

  formal-correspondence:
    name: Proof-Code Correspondence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Check NaN-box and Luau builtin correspondence
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- python3 tools/check_formal_methods.py --check-correspondence
