name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  MOLT_BACKEND_DAEMON_CACHE_MB: "128"

jobs:
  docs-gates:
    name: Docs Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Sync Python environment
        run: uv sync --frozen --group dev

      - name: Type-check frontend Python (ty, zero-diagnostic ratchet)
        run: uv run ty check src

      - name: Check generated status blocks
        run: uv run python3 tools/update_status_blocks.py --check

      - name: Check generated benchmark docs
        run: uv run python3 tools/bench_report.py --manifest bench/results/docs_manifest.json --check --update-status-doc

      - name: Check docs architecture contract
        run: uv run python3 tools/check_docs_architecture.py

      - name: Check ecosystem compatibility ratchet (derived verdicts, down-only)
        run: uv run python3 tools/check_ecosystem_compat.py

      - name: Check differential suite layout (lane/naming hygiene)
        run: uv run python3 tools/check_differential_suite_layout.py

      - name: Check suite-honesty ratchet (tracked-fail manifest, down-only)
        run: uv run python3 tools/check_suite_honesty.py

      - name: Check perf-doc freshness (no unstamped stale perf snapshot)
        run: |
          git fetch --no-tags --depth=1 origin main || true
          uv run python3 tools/check_perf_freshness.py

      - name: Check op-kind registry generated files are in sync
        run: uv run python3 tools/gen_op_kinds.py --check

      - name: Check op-kind drift (frontend emitter vs registry; down-only baseline)
        run: uv run python3 tools/audit_op_kinds.py --check

      - name: Check WASM ABI generated files are in sync
        run: uv run python3 tools/gen_wasm_abi.py --check

      # Close the doc-59 §4 generator-gating holes: every generated authority
      # whose source is reproducible in a vanilla checkout is --check-gated so its
      # output cannot drift silently. (The generators whose source is NOT in the
      # repo — the gitignored CPython doc corpus, the live 3.12/3.13/3.14
      # interpreters, the pinned tinygrad checkout — are recorded ci_checkable =
      # false with a ci_skip_reason in tools/generator_manifest.toml and gated by
      # their sync tests instead; the meta-gate below enforces that distinction.)
      - name: Check intrinsics registry generated files are in sync
        run: uv run python3 tools/gen_intrinsics.py --check
      - name: Check codec tables generated files are in sync
        run: uv run python3 tools/gen_codecs.py --check
      - name: Check stringprep tables generated file is in sync
        run: uv run python3 tools/gen_stringprep_tables.py --check
      - name: Check frontend Protocol shim is in sync
        run: uv run python3 tools/gen_protocol.py --check
      - name: Check Luau support matrix doc is in sync
        run: uv run python3 tools/gen_luau_support_matrix.py --check
      - name: Check differential lane manifests are in sync
        run: uv run python3 tools/gen_diff_lanes.py --check

      # The semantic-fact-plane meta-gate (doc 59 Phases 1-3): every generated
      # authority is registered + --check-gated, no orphan generated files, and no
      # NEW silent-default `match` over a closed enum domain (the dispatch-handler-
      # mirror-hazard class). Idempotence/freshness of the in-repo generators is
      # proven by the per-generator --check steps above; this gate enforces the
      # registry completeness + the closed-domain exhaustiveness ratchet.
      - name: Check generator manifest + closed-domain exhaustiveness (fact plane)
        run: uv run python3 tools/check_generator_manifest.py --check

      - name: Check LLVM runtime ABI drift (preserved runtime calls)
        run: uv run python3 tools/llvm_runtime_abi_audit.py --check

      - name: Check structural-debt ratchet (kitchen-sink/undecomposed/hand-classifications/debt; down-only)
        run: uv run python3 tools/structural_audit.py --check

      - name: Check runtime bridge test stubs are in sync
        run: uv run python3 tools/check_runtime_bridge_test_stubs.py

      - name: Check call-fact representation ratchet (attached call facts; up-only + evidence fresh)
        run: uv run python3 tools/call_fact_coverage.py --check

      - name: Run docs architecture tests
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            uv run python3 -m pytest -q tests/test_update_status_blocks.py tests/test_bench_report.py tests/test_check_docs_architecture.py tests/test_compatibility_contract_docs.py tests/test_ecosystem_compat.py tests/test_check_suite_honesty.py tests/test_gen_op_kinds.py tests/test_gen_wasm_abi.py tests/test_gen_intrinsics.py tests/test_molt_dev.py tests/test_structural_audit.py tests/test_call_fact_coverage.py tests/test_llvm_runtime_abi_audit.py tests/tools/test_perf_authority.py tests/tools/test_analysis_capsule.py tests/tools/test_runtime_bridge_test_stubs.py

      - name: Summarize guarded command hotspots
        if: always()
        run: python3 tools/profile_hotspots.py --limit 20

  python-tooling-smoke:
    name: Python Tooling Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Sync Python environment
        run: uv sync --frozen --group dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure adaptive Rust parallelism
        run: python3 tools/ci_resource_env.py --github-env "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Install native linker
        run: |
          sudo apt-get update
          sudo apt-get install -y lld
          ld.lld --version

      - name: Run Python smoke tests
        env:
          MOLT_NATIVE_TEST_TIMEOUT_SEC: "900"
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            uv run python3 -m pytest -q \
            -m "not slow" \
            tests/test_bench_harness.py \
            tests/test_bench_tool.py \
            tests/test_ci_workflow_topology.py \
            tests/test_harness_conformance.py \
            tests/test_harness_layers.py \
            tests/test_harness_report.py \
            tests/test_manifest_env.py \
            tests/test_monty_conformance_runner.py

      - name: Run bench CLI native smoke tests
        env:
          MOLT_NATIVE_TEST_TIMEOUT_SEC: "900"
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            uv run python3 -m pytest -q \
            tests/test_bench_tool.py::test_bench_cli_native_smoke_contract_batch_reuses_compiler

      - name: Test capability manifest import
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            env PYTHONPATH=src uv run python3 -c \
            "from molt.capability_manifest import CapabilityManifest; m = CapabilityManifest(); assert m.to_env_vars()['MOLT_CAPABILITIES'] == ''; print('OK')"

      - name: Test harness report import
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            env PYTHONPATH=src uv run python3 -c \
            "from molt.harness_report import LayerResult, LayerStatus; r = LayerResult(name='ci', status=LayerStatus.PASS, duration_s=0.1); assert r.passed; print('OK')"

      - name: Summarize guarded command hotspots
        if: always()
        run: python3 tools/profile_hotspots.py --limit 20

  rust-build-unit-smoke:
    name: Rust Build And Unit Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure adaptive Rust parallelism
        run: python3 tools/ci_resource_env.py --github-env "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          mkdir -p logs
          set -o pipefail
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo build 2>&1 | tee logs/ci-cargo-build.log

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Run molt-backend unit tests (native backend)
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-backend --features native-backend --lib

      - name: Run molt-tir tests (midend authority + invariants)
        # TIR owns residual lowering and representation-planning invariants.
        # Its integration gates, including representation_unification.rs, must
        # run in CI rather than merely compile under clippy.
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-tir

      - name: Clippy (molt-backend)
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo clippy -p molt-backend --features native-backend -- -D warnings

      - name: Clippy (molt-ir)
        # molt-ir owns the immutable IR/TIR vocabulary, op-kind registry, SSA
        # op-lowering, and effect-proof facts extracted out of molt-tir (doc 21).
        # It holds midend invariants the whole compiler depends on. `cargo clippy
        # -p molt-tir` does NOT lint molt-ir's own code (clippy lints only the
        # selected crate, not its dependencies), so without this step the
        # extraction would have silently dropped the bulk of the midend off the
        # zero-warning ratchet. Gate it identically to molt-tir/molt-backend.
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo clippy -p molt-ir --all-targets --all-features -- -D warnings

      - name: Clippy (molt-passes)
        # molt-passes owns the TIR pass/fact/orchestration layer (value-range,
        # gvn, counted-loop, strength-reduction, the inliner, representation
        # facts) extracted out of molt-tir. These are the pass contracts the
        # "Clippy (molt-tir)" step below was written to protect; after the
        # extraction they live here, so this step keeps them on the same ratchet.
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo clippy -p molt-passes --all-targets --all-features -- -D warnings

      - name: Clippy (molt-tir)
        # TIR owns the residual lowering/representation-planning midend; keep
        # its test targets and feature-gated utilities on the same zero-warning
        # ratchet as the backend that consumes them. The pass and IR-vocabulary
        # halves of the midend are gated by the molt-passes/molt-ir steps above.
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo clippy -p molt-tir --all-targets --all-features -- -D warnings

      - name: Clippy (runtime satellites)
        # The feature-gated stdlib satellite crates (molt-runtime-X) are the
        # DEFAULT native source for their modules but were never clippy-gated, so
        # lints drifted in silently (e.g. an unnecessary u64->u64 cast in crypto,
        # a manual loop in regex). Gate every satellite with -D warnings so the
        # default-tier runtime stays lint-clean alongside molt-backend.
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo clippy --all-targets \
            -p molt-runtime-asyncio \
            -p molt-runtime-collections \
            -p molt-runtime-compression \
            -p molt-runtime-core \
            -p molt-runtime-crypto \
            -p molt-runtime-difflib \
            -p molt-runtime-http \
            -p molt-runtime-ipaddress \
            -p molt-runtime-itertools \
            -p molt-runtime-logging \
            -p molt-runtime-math \
            -p molt-runtime-net \
            -p molt-runtime-path \
            -p molt-runtime-protobuf \
            -p molt-runtime-regex \
            -p molt-runtime-serial \
            -p molt-runtime-stringprep \
            -p molt-runtime-text \
            -p molt-runtime-tk \
            -p molt-runtime-xml \
            -p molt-runtime-zoneinfo \
            -- -D warnings

      - name: Test molt-snapshot
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-snapshot

      - name: Test molt-embed
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-embed

      - name: Test molt-harness
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-harness

      - name: Test molt-runtime-protobuf
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo test -p molt-runtime-protobuf

      - name: Verify zero warnings
        run: |
          WARNING_COUNT=$(grep -c 'warning\[' logs/ci-cargo-build.log || true)
          echo "Warnings found: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -ne 0 ]; then
            echo "::error::Build produced $WARNING_COUNT warning(s). Please fix all warnings."
            WARNING_LINES=$(grep 'warning\[' logs/ci-cargo-build.log || true)
            printf '%s\n' "$WARNING_LINES"
            exit 1
          fi

      - name: Summarize guarded command hotspots
        if: always()
        run: python3 tools/profile_hotspots.py --limit 20

  llvm-backend:
    name: LLVM Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure adaptive Rust parallelism
        run: python3 tools/ci_resource_env.py --github-env "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      # The LLVM backend is gated behind the `llvm` cargo feature and links
      # against inkwell/llvm-sys, which require the matching LLVM toolchain.
      # The required major version is derived from the inkwell feature pin in
      # the Cargo feature graph (e.g. `llvm22-1` -> LLVM 22).
      - name: Resolve required LLVM major version
        id: llvmver
        run: |
          MAJOR=$(PYTHONPATH=src python3 -m molt.llvm_toolchain --github-output "$GITHUB_OUTPUT")
          if [ -z "$MAJOR" ]; then echo "::error::could not resolve LLVM major"; exit 1; fi
          echo "Required LLVM major: $MAJOR"

      - name: Install LLVM toolchain
        run: |
          MAJOR="${{ steps.llvmver.outputs.major }}"
          # Upstream LLVM apt installer (apt.llvm.org) provides per-major builds.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh "$MAJOR"
          sudo apt-get install -y "llvm-$MAJOR-dev" "libpolly-$MAJOR-dev" lld
          # llvm-sys discovers the install via the exact manifest-derived env var.
          echo "${{ steps.llvmver.outputs.env_var }}=$(llvm-config-$MAJOR --prefix)" >> "$GITHUB_ENV"
          "llvm-config-$MAJOR" --version

      # Deterministic regression gate for the integer-overflow miscompile.
      # The LLVM backend used to emit raw machine add/sub/mul on any TirType::I64
      # and mask to 47 bits with no BigInt promotion, so integers crossing 2**47
      # produced wrong results only on this backend. These unit tests assert the
      # IR routes non-overflow-safe integer arithmetic through molt_add and keeps
      # the raw path only for plan-proven overflow-safe carriers.
      - name: Build molt-backend with the llvm feature
        run: |
          mkdir -p logs
          set -o pipefail
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            cargo build -p molt-backend --features "native-backend llvm" 2>&1 \
            | tee logs/ci-llvm-build.log

      - name: Verify zero warnings (llvm feature)
        run: |
          WARNING_COUNT=$(grep -c 'warning\[' logs/ci-llvm-build.log || true)
          echo "Warnings found: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -ne 0 ]; then
            echo "::error::LLVM build produced $WARNING_COUNT warning(s)."
            grep 'warning\[' logs/ci-llvm-build.log || true
            exit 1
          fi

      # Scope to the `llvm_backend::lowering` test module so this stays a green,
      # deterministic gate for the integer-overflow miscompile (and all LLVM
      # lowering invariants). The broader `tests::` module contains a separate,
      # pre-existing failing stdlib-partition test
      # (`llvm_backend_keeps_shared_stdlib_partition_external`) tracked apart from
      # this fix; it must not mask overflow regressions here.
      - name: Run LLVM lowering + int-overflow regression tests
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            cargo test -p molt-backend --features "native-backend llvm" --lib llvm_backend::lowering

      - name: Clippy (molt-backend, llvm feature)
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            cargo clippy -p molt-backend --features "native-backend llvm" --lib -- -D warnings

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Sync Python environment
        run: uv sync --frozen --group dev

      # End-to-end differential gate: build integer-overflow programs through the
      # LLVM backend and compare stdout against CPython and the native backend.
      # This is the build/run/compare gate the cross-backend audit asked for.
      #
      # NOTE: this step is currently `continue-on-error` because the LLVM backend
      # has a SEPARATE, pre-existing, flaky stdlib-partition pipeline crash
      # (`[TIR] verification failed ... entry block ^bb0 does not exist` while
      # compiling `molt_init___future__` / `_Feature.__init__`) that intermittently
      # aborts the build before the overflow program runs. That bug is independent
      # of the integer-overflow fix and already has its own failing unit test
      # (`tests::llvm_backend_keeps_shared_stdlib_partition_external`). The
      # deterministic IR-level regression for the overflow miscompile is the hard
      # gate above (`cargo test ... --lib llvm_backend`). Once the stdlib-partition
      # crash is fixed, drop `continue-on-error` to make this a blocking gate.
      - name: LLVM int-overflow differential tests (build/run vs CPython)
        continue-on-error: true
        env:
          MOLT_NATIVE_TEST_TIMEOUT_SEC: "900"
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- \
            uv run python3 -m pytest -q \
            tests/test_native_lir_loop_join_semantics.py \
            -k "int_accumulator_crosses_47 or int_overflows_i64 or int_sum_accumulator_overflow or non_overflowing_int_loop"

      - name: Summarize guarded command hotspots
        if: always()
        run: python3 tools/profile_hotspots.py --limit 20
