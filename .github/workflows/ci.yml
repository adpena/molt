name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Unit Tests
    runs-on: macos-14  # ARM64 (M1)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Build
        run: cargo build

      - name: Run molt-backend unit tests
        run: cargo test -p molt-backend --lib

      - name: Verify zero warnings
        run: |
          WARNING_COUNT=$(cargo build 2>&1 | grep -c 'warning\[' || true)
          echo "Warnings found: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -ne 0 ]; then
            echo "::error::Build produced $WARNING_COUNT warning(s). Please fix all warnings."
            cargo build 2>&1 | grep 'warning\[' || true
            exit 1
          fi

  differential-tests:
    name: Differential Tests
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Install molt Python package
        run: pip install -e .

      - name: Build release molt binary
        run: cargo build --release -p molt-backend

      - name: Run first 100 differential tests
        run: |
          # Collect first 100 test files
          TEST_FILES=$(ls tests/differential/basic/*.py | head -100)
          TOTAL=$(echo "$TEST_FILES" | wc -l | tr -d ' ')
          PASS=0
          FAIL=0
          ERRORS=""

          echo "Running $TOTAL differential tests..."

          for f in $TEST_FILES; do
            TEST_NAME=$(basename "$f")
            # Get CPython output
            EXPECTED=$(python3 "$f" 2>&1) || true
            # Get Molt output
            ACTUAL=$(./target/release/molt "$f" 2>&1) || true

            if [ "$EXPECTED" = "$ACTUAL" ]; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
              ERRORS="$ERRORS\n  FAIL: $TEST_NAME"
            fi
          done

          RATE=$((PASS * 100 / TOTAL))
          echo ""
          echo "===== Differential Test Results ====="
          echo "Total:  $TOTAL"
          echo "Pass:   $PASS"
          echo "Fail:   $FAIL"
          echo "Rate:   ${RATE}%"

          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "Failed tests:"
            echo -e "$ERRORS"
          fi

          echo ""
          echo "::notice::Differential test pass rate: ${RATE}% ($PASS/$TOTAL)"

  benchmark:
    name: Benchmark
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Build release runtime
        run: cargo build --release -p molt-runtime

      - name: Install molt Python package
        run: pip install -e .

      - name: Run benchmarks
        run: |
          python3 bench/harness.py --bench --output bench/results.json

      - name: Check for regression against baseline
        run: |
          if [ ! -f bench/baseline.json ]; then
            echo "::warning::No baseline.json found. Skipping regression check."
            exit 0
          fi

          python3 -c "
          import json, sys

          with open('bench/baseline.json') as f:
              baseline = json.load(f)
          with open('bench/results.json') as f:
              results = json.load(f)

          regressions = []
          for name, res in results.items():
              if name in baseline:
                  base_time = baseline[name].get('molt_time') or baseline[name].get('time', 0)
                  curr_time = res.get('molt_time') or res.get('time', 0)
                  if base_time > 0 and curr_time > 0:
                      ratio = curr_time / base_time
                      if ratio > 1.20:
                          regressions.append((name, ratio))

          if regressions:
              print('Benchmark regressions (>20%):')
              for name, ratio in sorted(regressions, key=lambda x: -x[1]):
                  print(f'  {name}: {ratio:.2f}x slower')
              sys.exit(1)
          else:
              print('No benchmark regressions detected.')
          "

  parity:
    name: Parity Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Install molt Python package
        run: pip install -e .

      - name: Build release molt binary
        run: cargo build --release -p molt-backend

      - name: Run parity tests
        run: |
          python3 bench/harness.py --parity --verbose

      - name: Report parity results
        if: always()
        run: |
          if [ -f bench/results.json ]; then
            python3 -c "
          import json
          with open('bench/results.json') as f:
              data = json.load(f)
          total = len(data)
          passed = sum(1 for v in data.values() if v.get('pass') or v.get('status') == 'pass')
          print(f'Parity results: {passed}/{total} passed')
          " || echo "Could not parse results."
          else
            echo "::warning::No results.json produced by parity tests."
          fi
