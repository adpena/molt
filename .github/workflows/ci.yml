name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  docs-gates:
    name: Docs Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Sync Python environment
        run: uv sync --group dev --python 3.12

      - name: Check generated status blocks
        run: uv run --python 3.12 python3 tools/update_status_blocks.py --check

      - name: Check generated benchmark docs
        run: uv run --python 3.12 python3 tools/bench_report.py --manifest bench/results/docs_manifest.json --check --update-status-doc

      - name: Check docs architecture contract
        run: uv run --python 3.12 python3 tools/check_docs_architecture.py

      - name: Run docs architecture tests
        run: uv run --python 3.12 python3 -m pytest -q tests/test_update_status_blocks.py tests/test_bench_report.py tests/test_check_docs_architecture.py tests/test_compatibility_contract_docs.py

  python-tooling-smoke:
    name: Python Tooling Smoke
    needs: docs-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Sync Python environment
        run: uv sync --group dev --python 3.12

      - name: Run Python smoke tests
        run: |
          uv run --python 3.12 python3 -m pytest -q \
            tests/test_harness_report.py \
            tests/test_manifest_env.py

      - name: Test capability manifest import
        run: |
          PYTHONPATH=src uv run --python 3.12 python3 -c \
            "from molt.capability_manifest import CapabilityManifest; m = CapabilityManifest(); assert m.to_env_vars()['MOLT_CAPABILITIES'] == ''; print('OK')"

      - name: Test harness report import
        run: |
          PYTHONPATH=src uv run --python 3.12 python3 -c \
            "from molt.harness_report import LayerResult, LayerStatus; r = LayerResult(name='ci', status=LayerStatus.PASS, duration_s=0.1); assert r.passed; print('OK')"

  rust-build-unit-smoke:
    name: Rust Build And Unit Smoke
    needs: docs-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Build
        run: cargo build

      - name: Run molt-backend unit tests
        run: cargo test -p molt-backend --lib

      - name: Test molt-snapshot
        run: cargo test -p molt-snapshot

      - name: Test molt-embed
        run: cargo test -p molt-embed

      - name: Test molt-harness
        run: cargo test -p molt-harness

      - name: Test molt-runtime-protobuf
        run: cargo test -p molt-runtime-protobuf

      - name: Verify zero warnings
        run: |
          WARNING_COUNT=$(cargo build 2>&1 | grep -c 'warning\[' || true)
          echo "Warnings found: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -ne 0 ]; then
            echo "::error::Build produced $WARNING_COUNT warning(s). Please fix all warnings."
            cargo build 2>&1 | grep 'warning\[' || true
            exit 1
          fi
