name: Perf Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MOLT_SESSION_ID: perf-validation
      MOLT_EXT_ROOT: ${{ github.workspace }}
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      MOLT_DIFF_CARGO_TARGET_DIR: ${{ github.workspace }}/target
      MOLT_CACHE: ${{ github.workspace }}/.molt_cache
      MOLT_DIFF_ROOT: ${{ github.workspace }}/tmp/diff
      MOLT_DIFF_TMPDIR: ${{ github.workspace }}/tmp
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
      TMPDIR: ${{ github.workspace }}/tmp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync Python environment
        run: uv sync --group bench --group dev --python 3.12

      - name: Run benchmarks
        run: python3 tools/bench.py --molt-profile release --json-out bench/results/perf-validation.json

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results/perf-validation.json
