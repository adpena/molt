name: Symphony Swarm Automerge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  swarm-automerge:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Gate Symphony swarm PRs
        id: gate
        uses: actions/github-script@v7
        env:
          SWARM_LOGINS: ${{ vars.SYMPHONY_SWARM_GITHUB_LOGINS }}
          SWARM_BRANCH_PREFIXES: ${{ vars.SYMPHONY_SWARM_BRANCH_PREFIXES }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const normalize = (value) =>
              String(value || "")
                .split(",")
                .map((entry) => entry.trim().toLowerCase())
                .filter((entry) => entry.length > 0);

            const logins = normalize(process.env.SWARM_LOGINS || "adpena,symphony");
            const prefixes = normalize(process.env.SWARM_BRANCH_PREFIXES || "codex/,symphony/,swarm/");
            const loginMatches = (candidate) =>
              logins.some((token) => String(candidate || "").toLowerCase().includes(token));

            const author = String(pr.user?.login || "").toLowerCase();
            const branch = String(pr.head?.ref || "").toLowerCase();
            const sameRepo = String(pr.head?.repo?.full_name || "") === `${context.repo.owner}/${context.repo.repo}`;
            const authorMatch = loginMatches(author);
            const branchMatch = prefixes.some((prefix) => branch.startsWith(prefix));
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const blockedCommits = [];
            for (const commit of commits) {
              const fields = [
                commit.author?.login,
                commit.commit?.author?.name,
                commit.commit?.author?.email,
                commit.commit?.committer?.name,
                commit.commit?.committer?.email,
              ].filter(Boolean);
              const trusted = fields.some((field) => loginMatches(field));
              if (!trusted) {
                blockedCommits.push({
                  sha: String(commit.sha || "").slice(0, 12),
                  author_login: commit.author?.login || null,
                  author_name: commit.commit?.author?.name || null,
                  author_email: commit.commit?.author?.email || null,
                });
              }
            }

            const commitsTrusted = blockedCommits.length === 0;
            const shouldMerge = sameRepo && authorMatch && branchMatch && commitsTrusted;
            core.info(
              JSON.stringify(
                {
                  sameRepo,
                  author,
                  authorMatch,
                  branch,
                  branchMatch,
                  commits_count: commits.length,
                  commitsTrusted,
                  blockedCommits,
                  shouldMerge,
                },
                null,
                2
              )
            );
            core.setOutput("should_merge", shouldMerge ? "true" : "false");

      - name: Auto-approve swarm PR
        if: ${{ steps.gate.outputs.should_merge == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: "APPROVE",
                body: "Auto-approved by Symphony swarm policy.",
              });
            } catch (error) {
              if (error?.status === 422) {
                core.info("Approval already present or not required.");
              } else {
                throw error;
              }
            }

      - name: Enable auto-merge (squash)
        if: ${{ steps.gate.outputs.should_merge == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.graphql(
              `
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                  ) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `,
              { pullRequestId: pr.node_id }
            );
