name: Security Hardening

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Set up project Python
        run: uv python install "$(cat .python-version)"
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: pip-audit
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- uv run pip-audit --ignore-vuln CVE-2025-69872

  rust-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny and cargo-audit
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo install cargo-deny --locked
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo install cargo-audit --locked
      - name: cargo deny check
        run: python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo deny check
      - name: cargo audit
        run: |
          rm -rf "${CARGO_HOME:-$HOME/.cargo}/advisory-db"
          python3 tools/guarded_exec.py --prefix MOLT_TEST_SUITE -- cargo audit
