name: Perf Gate (canonical CPython-floor scoreboard)

# The ONE release-blocking performance authority. Runs the canonical scoreboard
# (tools/perf_scoreboard.py) at the release-fast contract profile, cold+warm,
# native+LLVM, repeat-CI, with the quiescence guard and the 5-state classifier,
# and FAILS the gate on:
#   * any warm cell below the CPython floor (warm_speedup <= 1.00 -> FAIL_ENGINE),
#   * any non-authoritative tree (local tip != origin/main, dirty -> FAIL_STALE),
#   * any UNSTABLE / BUILD_FAILED / RUN_ERROR cell.
# The scoreboard gates by default (nonzero exit on RED/FAIL_STALE). This is the
# perf-plane sibling of the docs ratchets: a single fresh, quiescent,
# native+LLVM release-fast source is the only citable authority.
#
# Every other local perf lane is non-canonical and stamps authoritative=false
# through tools/perf_authority.py; the freshness gate in ci.yml keeps stale
# markdown snapshots from masquerading as current.
#
# Triggers: push to main (the release-blocking gate, debounced by the
# concurrency group below so only the latest main tip is gated) +
# workflow_dispatch + a weekly schedule. Set branch protection to REQUIRE both
# matrix jobs. tools/check_perf_gate_wiring.py (ci_gate tier-1) fails closed if
# this gate is ever un-wired from main again — a gate that never fires certifies
# nothing (meta-bug audit: proxy-measurement substitution, TIER-0).

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Weekly canonical re-measure (Mondays 06:00 UTC) so the citable board stays
    # fresh even between perf-touching PRs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: perf-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  cpython-floor:
    name: CPython-floor scoreboard (${{ matrix.backend }} / release-fast)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        backend: [native, llvm]
    env:
      MOLT_SESSION_ID: perfscore-${{ matrix.backend }}
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/sessions/perfscore-${{ matrix.backend }}
      MOLT_EXT_ROOT: ${{ github.workspace }}
      MOLT_CACHE: ${{ github.workspace }}/.molt_cache
      MOLT_DIFF_ROOT: ${{ github.workspace }}/tmp/diff
      MOLT_DIFF_TMPDIR: ${{ github.workspace }}/tmp
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
      TMPDIR: ${{ github.workspace }}/tmp
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the provenance check can resolve origin/main and
          # the merge-base (authoritative requires local tip == origin/main).
          fetch-depth: 0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure adaptive Rust parallelism
        run: python3 tools/ci_resource_env.py --github-env "$GITHUB_ENV"

      # Keep perf-gate backend setup on the same manifest-derived LLVM selector
      # as the LLVM CI job; llvm-sys needs the exact LLVM_SYS_*_PREFIX value.
      - name: Resolve required LLVM major version
        if: matrix.backend == 'llvm'
        id: llvmver
        run: |
          MAJOR=$(PYTHONPATH=src python3 -m molt.llvm_toolchain --github-output "$GITHUB_OUTPUT")
          if [ -z "$MAJOR" ]; then echo "::error::could not resolve LLVM major"; exit 1; fi
          echo "Required LLVM major: $MAJOR"

      - name: Install LLVM toolchain
        if: matrix.backend == 'llvm'
        run: |
          MAJOR="${{ steps.llvmver.outputs.major }}"
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh "$MAJOR"
          sudo apt-get install -y "llvm-$MAJOR-dev" "libpolly-$MAJOR-dev" lld
          echo "${{ steps.llvmver.outputs.env_var }}=$(llvm-config-$MAJOR --prefix)" >> "$GITHUB_ENV"
          "llvm-config-$MAJOR" --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: perfscore-${{ matrix.backend }}

      - name: Sync Python environment
        run: uv sync --frozen --group bench --group dev

      - name: Make origin/main resolvable for provenance
        run: git fetch --no-tags origin main || true

      - name: Run canonical CPython-floor scoreboard (release-fast, classified)
        # release-fast is the daily contract profile. --classify yields the
        # 5-state taxonomy; --require-quiescent stamps authoritative=false on a
        # contended runner so a loaded-machine red is never treated as a target.
        # --repeat 5 supplies the confidence interval that separates stable
        # compiler targets from noise. Each matrix lane is one parallel slice of
        # the canonical native+LLVM board; branch protection requires both.
        # The gate exits nonzero on any RED warm cell OR FAIL_STALE.
        run: |
          python3 tools/guarded_exec.py --prefix MOLT_BENCH -- \
            uv run python3 tools/perf_scoreboard.py \
              --set core \
              --backend "${{ matrix.backend }}" \
              --profile release-fast \
              --samples 5 \
              --warmup 2 \
              --repeat 5 \
              --classify \
              --require-quiescent \
              --print-provenance \
              --out "bench/scoreboard/cpython_ci_${{ matrix.backend }}.json"

      - name: Project the five gated boards (doc 64 §3.2 measurement plane)
        # Pure consumer of the source scoreboard: project CPython / Backend /
        # Profile / PyPy / Codon, each its own gated artifact. The plane gate
        # exits nonzero iff ANY board FAILs -- so a native win cannot hide a
        # wasm/llvm regression (the Backend board has its own exit code) and a
        # release-output win cannot hide a release-fast regression. The CLI writes
        # all five artifacts BEFORE returning the gate exit code, so the views are
        # materialized even when this step then fails the plane gate. `if: always`
        # ensures the projection runs (and uploads) even on a step-1 RED. This
        # step GATES on the plane (the canonical measurement is never neutered);
        # the plane is an additive re-statement of the same absolute CPython floor
        # as five separate exit codes.
        if: always()
        run: |
          uv run python3 tools/perf_board.py \
            "bench/scoreboard/cpython_ci_${{ matrix.backend }}.json" \
            --out-dir "bench/scoreboard/plane_${{ matrix.backend }}"

      - name: Board-vs-history regression gate (doc 64 Phase 4)
        # Compare the projected boards against the most-recent AUTHORITATIVE
        # same-class baseline committed in bench/scoreboard/history/. FAILS CI on
        # a previously-green cell that regressed (CLAUDE.md triage priority #2).
        # On a quiescent authoritative run this also records the new baseline so
        # the next PR diffs against it. A non-authoritative (contended-runner)
        # board is recorded but never becomes a baseline (Rule 2), and its warm
        # reds are advisory -- the regression delta is the contamination-robust
        # axis the per-merge gate trusts.
        run: |
          uv run python3 tools/perf_history.py \
            bench/scoreboard/plane_${{ matrix.backend }}/cpython_*.json \
            bench/scoreboard/plane_${{ matrix.backend }}/backend_*.json \
            bench/scoreboard/plane_${{ matrix.backend }}/profile_*.json \
            --gate --record

      - name: Upload scoreboard + plane artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cpython-floor-scoreboard-${{ matrix.backend }}
          path: |
            bench/scoreboard/cpython_ci_${{ matrix.backend }}.json
            bench/scoreboard/plane_${{ matrix.backend }}/
            bench/scoreboard/logs_*/
