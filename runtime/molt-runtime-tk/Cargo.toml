[package]
name = "molt-runtime-tk"
version = "0.1.0"
publish = false
edition = "2024"
license = "Apache-2.0"

[dependencies]
molt-runtime-core = { path = "../molt-runtime-core" }
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
libloading = { version = "0.9", optional = true }
libc = "0.2"

[features]
default = ["tk"]
tk = ["dep:libloading"]
