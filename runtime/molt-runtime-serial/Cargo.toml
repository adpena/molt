[package]
name = "molt-runtime-serial"
version = "0.1.0"
publish = false
edition = "2024"
license = "Apache-2.0"

[dependencies]
molt-runtime-core = { path = "../molt-runtime-core" }
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
libc = "0.2"
num-bigint = "0.4"
memchr = "2"
num-traits = "0.2"
libm = "0.2"
serde_json = { version = "1.0", optional = true }

[features]
default = ["serial"]
serial = ["dep:serde_json"]
