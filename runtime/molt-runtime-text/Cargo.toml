[package]
name = "molt-runtime-text"
version = "0.1.0"
publish = false
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"
description = "Text/encoding intrinsics for the Molt runtime (unicodedata, html)"

[features]
default = ["stdlib_text"]
stdlib_text = []
stdlib_unicode_names = ["stdlib_text", "dep:unicode_names2"]

[dependencies]
# Core runtime types used by the text implementations
molt-runtime-core = { path = "../molt-runtime-core" }
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
unicode_names2 = { version = "3.1", optional = true }
memchr = "2.8"
