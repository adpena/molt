[package]
name = "molt-wasm-host"
version = "0.1.0"
publish = false
edition = "2024"
license = "Apache-2.0"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
num-format = { version = "0.4.4", features = ["with-system-locale"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { workspace = true }
rmpv = "1.3"
wasmtime = "46.0.1"
wasmtime-wasi = "46.0.1"
socket2 = { version = "0.6", features = ["all"] }
libc = "0.2"
tungstenite = { version = "0.29", default-features = false, features = ["handshake", "rustls-tls-webpki-roots", "url"] }
url = "2.5"
os_pipe = "1.2"
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
molt-runtime = { path = "../molt-runtime" }
sha2 = "0.11"

[target.'cfg(windows)'.dependencies]
# num-format's `with-system-locale` Windows backend imports GetLastError but
# only enables winapi/winnls itself. Declare the Windows API surface required by
# the locale contract here so release-fast workspace builds are deterministic on
# Windows.
winapi = { version = "0.3.9", features = ["errhandlingapi"] }
windows-sys = { version = "0.61.2", features = ["Win32_Foundation", "Win32_Networking_WinSock", "Win32_System_Threading"] }
