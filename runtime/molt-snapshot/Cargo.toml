[package]
name = "molt-snapshot"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "WASM execution state snapshot and resume for Molt"

[dependencies]
sha2 = "0.11"
serde = { version = "1.0", features = ["derive"] }
rmp-serde = "1"

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "format_comparison"
harness = false
