[package]
name = "molt-tir"
version = "0.1.0"
publish = false
edition = "2024"
license = "Apache-2.0"

# molt-tir is the backend-agnostic residual lower layer extracted from
# molt-backend (decomposition program doc 21, moves T1/S1/S2a): lowering and
# representation planning. Immutable IR data, op-kind registry facts, SimpleIR
# transport, representation vocabulary, and leaf utilities live in molt-ir;
# pass/fact/orchestration logic lives in molt-passes. It has ZERO dependencies
# on any backend (native/wasm/luau/llvm/rust); every backend crate depends on
# molt-tir, not the reverse. Editing a TIR pass recompiles molt-passes (and
# relinks dependents) instead of the whole 230k-line backend monolith.

[dependencies]
libc = "0.2"
molt-ir = { path = "../molt-ir" }
molt-passes = { path = "../molt-passes" }
rayon = "1.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1"

[features]
default = []
# Semantic gates mirrored from molt-backend so the feature-conditional TIR code
# compiles identically; molt-backend activates these via molt-tir/<feature>.
native-backend = ["molt-ir/native-backend", "molt-passes/native-backend"]
llvm = ["molt-ir/llvm", "molt-passes/llvm"]
wasm-backend = ["molt-ir/wasm-backend", "molt-passes/wasm-backend"]
# Exposes the crate-private `#[cfg(test)]` accessor seams (representation-plan,
# tir-cache, and value-range test helpers) across the crate boundary so
# molt-backend's own test suites can reach them. molt-backend activates this via
# its [dev-dependencies] entry; it is never part of any shipped build.
test-util = ["molt-ir/test-util", "molt-passes/test-util"]
