# FRONTEND-SPECIFIC (b) preserved-Copy / no-[[kind]]-row: frontend-internal
# op.kinds that serialization rewrites to a may-throw wire kind with no
# first-class mapper opcode. The inplace_* arith family serializes to
# inplace_{div,floordiv,mod,pow,lshift,rshift,matmul,bit_*} (the molt_inplace_*
