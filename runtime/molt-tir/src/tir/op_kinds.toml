# The attribute READ borrows its source object (operand 0) AND its result may be
# an interior borrow / opaque raw-int handle INTO that source's backing store
# (the `Counter._handle` registry-handle class). `interior_borrow_keepalive`
# records this on operand 0 (design 27 §2.1 / §1.5 borrow-of edge): the source's
# drop is deferred to the borrow result's last use, not the source's own
# straight-line last use (the round-6 BLOCKER-1 UAF: dropping the wrapper after
# `get_attr` but before `molt_counter_len(handle)` ran the finalizer and made
# `len(Counter(...))` return 0). It is STILL borrowed (not consumed) — the op
# frees nothing — so the consume axis (`op_consumed_operand_root`) reads it as
# non-consuming; the keepalive is the extra liveness coupling layered on top.
