# ===========================================================================
# Operand-ownership overrides per WIRE-KIND SPELLING (molt task #57 follow-up;
# the borrow-signature column of design 27 §2.1/§2.3, the Perceus rung-2 seed
# of the #58 Owned/Borrowed/Raw/Consumed lattice).
#
# THE OPERAND-OWNERSHIP MODEL (two granularities — read both):
#
#   1. PER-OPCODE DEFAULT (the `operand_ownership` field on every [[opcode]]
#      row above). molt's compiled-function call convention is "callee borrows
#      all args, returns owned" (design 20 §1.2/§1.5) — so EVERY OpCode borrows
#      EVERY operand by default (`operand_ownership = "all_borrowed"`). The
#      field is EXHAUSTIVE over the enum (a new OpCode fails to render until it
#      is classified), the structural kill for the "is this operand consumed?"
#      assumption that was hardcoded across the RC passes.
#        Domain: "all_borrowed" | "all_consumed" | ["borrowed","consumed",...]
#        (a per-position list, length = the op's fixed operand arity). The
#        result-side lattice state (Owned/Borrowed/Raw/MaybeUninit, design 27
#        §1.1) is the classifier_* sets above — a SEPARATE axis from this
#        operand-side borrowed|consumed axis.
#
#   2. PER-SPELLING OVERRIDE (the [[consuming_kind]] rows below). A handful of
#      Copy-lifted CALL spellings CONSUME an operand: the runtime entry frees it
#      internally, so the holder MUST NOT also drop it (a trailing DecRef would
#      double-free). This is finer than the OpCode: `call`, `call_func`,
#      `call_guarded`, `call_internal`, `invoke_ffi`, `call_bind`,
#      `call_indirect` ALL map to OpCode::Call (one [[kind]] row, `call`
#      canonical + aliases) yet only `call_bind`/`call_indirect` carry a
#      pre-built CallArgs builder operand that the call frees via PtrDropGuard
#      (call/bind.rs; molt_call_bind_ic / molt_call_indirect_ic). The consume
#      fact is therefore keyed on the exact `_original_kind` spelling, not the
#      OpCode.
#
# Drives `kind_operand_ownership_table` (consumed by drop_insertion.rs's
# `op_consumed_operand_root`, which it REPLACES — design 27 §2.3: "Rung 1
# special-cased this in op_consumed_operand_root; Rung 2 makes it a row"). This
# retires the hand-coded `matches!(_original_kind, "call_bind" | "call_indirect")`
# consume list (the C6 CallArgs-double-free bug class). A future consuming op (a
# streaming builder, a move-into-collection intrinsic) is correctly handled by
# ADDING a row — never by editing the drop pass.
#
#   kind            : the wire-kind SPELLING (canonical OR alias) the
#                     `_original_kind` attr carries; cross-checked against the
#                     [[kind]] vocabulary at generation (an unknown spelling is
#                     a hard error — the structural kill for a typo'd override).
#   consumed_operand: "last"     — the LAST operand is consumed (preserves the
#                                   arity-independent `op.operands.last()`
#                                   semantics op_consumed_operand_root uses;
#                                   the CallArgs builder is operand [callee,
#                                   builder] index 1 = last), OR
#                     <integer>  — a fixed 0-based operand index is consumed.
# ===========================================================================

[[consuming_kind]]
# `obj.method(args)` / indirect-call un-fused idiom: lowers (in lower_to_simple)
# to `b = callargs_new; ...callargs_push_pos(b, a_i)...; r = call_bind(callee, b)`
# where molt_call_bind_ic FREES `b` internally (PtrDropGuard). The builder is the
# LAST operand ([callee, builder]); the call takes ownership exactly like a Return
# transfer — no trailing DecRef, or the TYPE_ID_CALLARGS object double-frees
# ("invalid object header before dec_ref").
kind = "call_bind"
consumed_operand = "last"

[[consuming_kind]]
# The indirect-call form, same CallArgs-builder PtrDropGuard convention
# (molt_call_indirect_ic). Builder is the last operand and is consumed.
kind = "call_indirect"
consumed_operand = "last"

# ===========================================================================
# Per-TERMINATOR operand ownership (molt task #58 ladder #72, design 27 §2.4
# "transfer sites"). The OWNERSHIP-MOVES-OUT axis of the operand-ownership
# lattice: a `Terminator` does not appear in the `[[opcode]]` enum (it is the
# `Terminator` enum in blocks.rs, NOT a `TirOp`), so its operand ownership is a
# DISTINCT table from `opcode_operand_ownership_table`. It is the generated
# authority drop_insertion.rs reads to decide which terminator operands TRANSFER
# ownership (the drop pass must NOT emit a trailing `DecRef` at a transfer point —
# the receiver owns it). This RETIRES the hand-coded transfer carve-out that lived
# inline in `terminator_branch_args` + the `Return` arm of `terminator_uses_root`.
#
# Each `Terminator` variant has TWO operand CATEGORIES, classified independently
# because they have different ownership:
#
#   * direct   — the terminator's own DIRECT operands (not forwarded to a
#                successor block arg): `Return { values }`, `CondBranch { cond }`,
#                `Switch { value }`.
#       - `Return` values are `transferred`: the return ABI moves `+1` to the
#         caller (design 20 §1.5 "returns owned"). Dropped NOWHERE in the callee.
#       - `CondBranch`/`Switch` predicates are `borrowed`: the branch TESTS the
#         value (it is still live AT the terminator, so it is not dropped at the
#         producing op's straight-line point), but ownership does NOT leave — the
#         value's drop is merely RELOCATED to the dying successor edge (§3
#         edge-dying). In molt's lowering the predicate is always an unboxed
#         bool/i64 discriminant (a raw scalar, `is_raw_scalar` ⇒ NOT droppable),
#         so this leaf is never reached for a heap value today; classifying it
#         `borrowed` preserves the EXACT prior `terminator_uses_root` semantics
#         (read-but-not-transfer) and stays correct if a future shape ever made
#         the predicate heap-carrying.
#   * branch_arg — the values FORWARDED to a successor's block arg (phi):
#                `Branch { args }`, `CondBranch { then_args, else_args }`,
#                `Switch { cases[].args, default_args }`. ALWAYS `transferred`:
#                ownership moves INTO the block param on the edge (the C3
#                forwarded-arg-double-drop class; the successor-side dual is
#                `incoming_arg_roots` in §3). Dropping it at the source would
#                double-free the phi's object.
#
# Drives `terminator_operand_ownership_table(kind, category)` and the derived
# `terminator_operand_is_transferred(kind, category)` (op_kinds_generated.rs),
# consumed by drop_insertion.rs's `terminator_branch_args` (branch_arg category)
# and `terminator_uses_root` (direct category). A FUTURE terminator transfer fact
# (a tail-call terminator, a `throw`-with-value transfer) is correctly handled by
# ADDING a row — never by editing the drop pass.
#
#   kind     : the `Terminator` enum variant name (EXHAUSTIVE over the enum — a
#              new variant fails to render until classified; the structural kill
#              for an unclassified terminator silently inheriting a borrow/transfer
#              assumption, mirroring the [[opcode]] exhaustiveness discipline).
#   direct / branch_arg : the `OperandOwnership` leaf for that category, OR
#              "none" (NoOperand) when the variant has no operand in that
#              category (e.g. `Branch` has no direct operand; `Return` forwards no
#              branch arg; `Unreachable` has neither).
# ===========================================================================

[[terminator]]
# Unconditional branch: no direct operand; its `args` are forwarded into the
# target's phi (transferred).
name = "Branch"
direct = "none"
branch_arg = "transferred"

[[terminator]]
# Conditional branch: `cond` is the borrowed predicate; `then_args`/`else_args`
# are forwarded into the successors' phis (transferred).
name = "CondBranch"
direct = "borrowed"
branch_arg = "transferred"

[[terminator]]
# Multi-way switch: `value` is the borrowed discriminant; each case's args +
# `default_args` are forwarded into the successors' phis (transferred).
name = "Switch"
direct = "borrowed"
branch_arg = "transferred"

[[terminator]]
# Generator/coroutine state dispatch: the dispatch state is implicit runtime
# frame state (no direct SSA operand); case/default args are forwarded into the
# resume successors' phis (transferred), matching Switch branch-arg semantics.
name = "StateDispatch"
direct = "none"
branch_arg = "transferred"

[[terminator]]
# Function return: `values` transfer `+1` each to the caller (design 20 §1.5);
# no branch args.
name = "Return"
direct = "transferred"
branch_arg = "none"

[[terminator]]
# Unreachable: no operands at all (no direct, no forwarded).
name = "Unreachable"
direct = "none"
branch_arg = "none"

# ===========================================================================
# Frontend pre-serialization op.kind tables (molt task #44, F2a — absorb the
# three hand-kept frontend tables that previously lived in
# src/molt/frontend/__init__.py). These describe the FRONTEND's UPPERCASE
# `op.kind` vocabulary (what the visit/emit walk produces BEFORE
# serialization lowercases it to the wire `[[kind]]` spelling above), which is a
# DISTINCT vocabulary from the wire kinds: e.g. the frontend emits
# `GETATTR_GENERIC_OBJ` which serialization rewrites to the wire kind
# `get_attr_generic_obj`. tools/gen_op_kinds.py renders these into
# src/molt/frontend/lowering/op_kinds_generated.py as RAISING_KIND_NAMES,
# CHECK_EXCEPTION_SKIP_KINDS, AUGASSIGN_OP_KIND and BINOP_OP_KIND, killing the
# frontend⇄backend dual raising-oracle (the residual task-#42 drift vector).
# ===========================================================================

# ---------------------------------------------------------------------------
# RAISING_KIND_NAMES — frontend `op.kind`s that can raise at runtime, so emit()
# attaches the expression-level col_offset for traceback caret annotations.
# Replaces the hand-kept `_RAISING_OP_KINDS` frozenset.
#
# Each row is one frontend UPPERCASE `op.kind`, in exactly ONE of two forms:
#
#   opcode = "<OpCode>"  — the kind lowercases to a wire `[[kind]]` spelling
#       whose mapper_opcode is this OpCode, and that OpCode is `may_throw = true`
#       above. The generator ASSERTS may_throw==true for this OpCode, so flipping
#       an opcode to nothrow while leaving it raising here is a generation-time
#       FAILURE — the structural kill for the dual raising-oracle drift. The
#       toml `[[opcode]]` oracle is canonical for these.
#
#   reason = "..."       — a FRONTEND-SPECIFIC raising kind that cannot derive
#       from the `[[opcode]]` oracle, in two sub-cases documented per row:
#         (a) pre-specialization: the kind lowercases to a wire kind whose
#             OpCode is nothrow (the proven typed int/float lane), but the
#             FRONTEND op is emitted BEFORE type specialization and may lower to
#             a boxed/dunder path that raises (e.g. `a + b` → TypeError). The
#             caret col must attach on the pre-specialization op.
#         (b) preserved-Copy / no-[[kind]]-row: a frontend-internal op.kind that
#             serialization rewrites to a may-throw wire kind with no first-class
#             mapper opcode (lifted to Copy{_original_kind} + symbol dispatch);
#             observably raising by effects.rs/alias_analysis.rs construction.
# ---------------------------------------------------------------------------

# OPCODE-MAPPED-RAISING: kind ⇒ may_throw OpCode (cross-checked at generation).
