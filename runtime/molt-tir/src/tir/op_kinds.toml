# duplicate of it: fusion preserves per-element evaluation order and count, so
# allocation/attribute-read/may-throw ops (`ObjectNewBound`, `LoadAttr`,
# `Index`, `Div`, ...) are SAFE to fuse and are deliberately NOT barriers, even
