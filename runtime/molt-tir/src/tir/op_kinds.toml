# This table is the ONE place the cross-component op-"kind"-string vocabulary
# lives. tools/gen_op_kinds.py renders it into:
#   - runtime/molt-tir/src/tir/op_kinds_generated.rs  (mapper + classifier
#     + per-OpCode effect-oracle arms), and
#   - src/molt/frontend/lowering/op_kinds_generated.py    (canonical spellings).
# tests/test_gen_op_kinds.py re-renders in memory and asserts equality with the
# checked-in generated files, so any drift is a test failure. Do NOT edit the
# generated files by hand; edit this table and regenerate.
#
# INDEPENDENT MAPPINGS over the shared kind vocabulary, kept distinct because
# they group differently (load-bearing: e.g. `range_new` is a mapper alias of
# the CallBuiltin group BUT an individual member of the fresh-value classifier
# set):
#   - classifier_* (below) — three FLAT sets of individual kinds (the flat
#                  matches! arms in alias_analysis.rs) + the fresh-value prefix.
#                  These are the RESULT-side ownership lattice (Owned/Borrowed/
#                  Raw/MaybeUninit, design 27 §1.1).
#   - [[opcode]]   — per-OpCode effect oracle (may_throw/side_effecting/purity),
#                  verifier result arity (`result_arity`), PLUS the per-OpCode
#                  operand-ownership default
#                  (`operand_ownership`, the OPERAND-side borrowed|consumed|
#                  interior_borrow_keepalive axis, design 27 §2.1). Both are
#                  exhaustive over the enum. The per-position `operand_ownership`
#                  list form classifies a single operand finer than the op
#                  default (e.g. `Index`'s container is interior-borrowed, its
#                  key merely borrowed).
#   - [[kind]]     — the kind_to_opcode mapper: OpCode-equivalence groups
#                  (canonical + aliases, the |-grouped arms).
#   - [[simpleir_control_kind]] — SimpleIR CFG/SSA/pre-SSA control facts for
#                  kinds consumed structurally before kind_to_opcode. These rows
#                  generate tir::is_structural, cfg.rs block-boundary helpers,
#                  and lower_from_simple.rs pre-SSA rewrite membership.
#   - [[consuming_kind]] — per-SPELLING operand-consume overrides (design 27
#                  §2.3): the Copy-lifted `_original_kind` spellings that free an
#                  operand internally (the CallArgs builder), finer than the
#                  OpCode. Consumed by drop_insertion.rs's op_consumed_operand_root.
#   - [[absorbing_kind]] — per-SPELLING result-absorption facts for Copy-lifted
#                  constructors (`*_new`) whose result owns operand lifetimes
#                  without becoming first-class [[kind]] aliases.
#   - [[absorbing_operand_kind]] — per-SPELLING existing-container store facts
#                  for preserved Copy-lifted mutators (`list_append`, etc.) whose
#                  value operand is retained by container storage while remaining
#                  borrowed at the ABI/drop edge.
#   - result_mints_owned_selected_operand — per-OpCode selected-alias result
#                  ownership: the backend returns one borrowed operand's bits and
#                  must retain that selected object to make the result an owned +1.
#   - [[result_finalizer_source_kind]] — per-SPELLING extraction facts whose
#                  fresh result may carry a finalizer-sensitive value from one
#                  source operand (`list_pop` result from list operand 0).
#   - operand_independent_result_type - optional single-result TirType fact for
#                  opcodes whose result type is intrinsic to the opcode. Omitted
#                  opcodes must be inferred from operands, attrs, or call/builtin
#                  metadata by type_refine.rs.
#   - [[result_validity]] - per-OpCode/per-result validity facts for result slots
#                  that are not initialized on every outgoing edge
#                  (`IterNextUnboxed` result 0 is valid only on the not-done edge).
#   - literal_payload_opcodes - opcode literal payload facts consumed by
#                  canonicalize.rs and check_exception_elim.rs.
#   - gvn_always_numberable_opcodes / gvn_type_gated_numberable_opcodes /
#                  gvn_value_keyed_constant_opcodes /
#                  gvn_numberable_attr_key_opcodes - opcode-role and value-key
#                  facts for GVN numbering policy. Always-numberable ops need no
#                  operand type gate, type-gated ops require primitive operands,
#                  and value-keyed constants get same-block local value numbers
#                  only. Any opcode whose equivalence depends on attrs names its
#                  exact payload-key attrs here; omitted/malformed attrs fail
#                  closed to identity numbering.
#   - proven_result_type_seed_opcodes - constant constructors whose intrinsic
#                  result type seeds type_refine.rs's proven-type map. ConstBigInt
#                  stays out because DynBox does not narrow backend guard proof.
#   - type_refine_attr_result_type_rules / type_refine_operand_type_rules -
#                  generated opcode-to-rule lattices for type_refine.rs result
#                  inference. The registry owns opcode membership; type_refine.rs
#                  owns the rule semantics and live operand/attr parsing.
#   - call_opcode_roles / call_graph_user_call_kinds - generated call graph and
#                  CallFacts dispatch facts. The opcode role owns first-class
#                  Call/CallMethod/CallBuiltin/Copy behavior; the kind predicate
#                  owns the exact `_original_kind` spellings that make a Copy
#                  fallback count as a user-level call edge.
#   - ssa_s_value_attr_keys / ssa_original_kind_preserving_kinds - generated
#                  SSA attr-transport facts. The registry owns which opcode gets
#                  which string-payload attr key and which SimpleIR spellings
#                  must be carried as `_original_kind`; ssa.rs owns live value
#                  resolution and attr insertion.
#   - polyhedral_loop_header_opcodes / polyhedral_affine_body_opcodes -
#                  generated opcode-only facts for polyhedral.rs loop-header
#                  annotation and affine-body eligibility. The pass owns body
#                  traversal and Copy refinement; the registry owns membership.
#   - sccp_constant_seed_rules / sccp_constant_eval_rules - generated
#                  opcode-to-rule lattices for SCCP constant seeding and
#                  constant evaluation. The registry owns opcode membership;
#                  sccp.rs owns attr parsing and CPython-compatible fold
#                  semantics.
#   - value_range_transfer_rules / value_range_const_fold_rules - generated
#                  opcode-to-rule lattices for integer interval transfer and
#                  value_range.rs's constant-mask/length derivation. The
#                  registry owns opcode membership; value_range.rs owns checked
#                  arithmetic, Python shift/mod semantics, and range soundness.
#   - range_devirt_roles - generated opcode-to-role lattice for the
#                  range_devirt.rs pattern scanner. The registry owns the closed
#                  CallBuiltin/GetIter/IterNextUnboxed role membership; the pass
#                  owns range name, operand/result shape, loop-role, and
#                  dominance/CFG validation.
#   - fuzz_tir_opcode_shapes - tooling-only opcode palette, operand counts, and
#                  synthetic attr payload rules for
#                  runtime/molt-backend/fuzz/fuzz_tir_passes.rs. Result counts
#                  come from `result_arity` through
#                  `opcode_fixed_result_count_table`.
#   - vectorize_opcode_facts - generated opcode-to-fact lattice for
#                  vectorize.rs body eligibility, loop-header markers,
#                  annotation targets, and reduction-family hints. The registry
#                  owns opcode membership; vectorize.rs owns CFG, accumulator
#                  recognition, lane typing, and hint emission.
#   - lir_verify_rules - generated opcode-to-rule lattice for verify_lir.rs
#                  representation-aware verifier hooks. The registry owns
#                  dispatch membership; verify_lir.rs owns invariant checking.
#   - exception_label_attr_opcodes - opcode facts for ops whose `value` attr is
#                  a SimpleIR exception label id.
#   - exception_transfer_edge_opcodes - subset of exception-label ops whose
#                  label-valued `value` attr contributes an implicit CFG edge.
#   - exception_region_nesting_roles - TryStart/TryEnd role facts consumed by
#                  DCE/SCCP try-depth tracking. Distinct from label and transfer
#                  facts: it owns lexical exception-region nesting only.
#   - canonicalize_commutative_reorder / canonicalize_swapped_comparison /
#                  canonicalize_binary_rules - ordered algebraic facts consumed
#                  by canonicalize.rs. They live here so operand rewrites do not
#                  carry backend-local hand-sets beside the generated opcode
#                  oracle.
#   - [[explicit_release_operand]] - per-OpCode Python lifetime release facts
#                  for ops that explicitly release one or all operand roots
#                  (`DecRef` all operands, `DeleteVar` old slot operand 1).
#   - alias_rc_barrier_opcodes / alias_heap_barrier_opcodes - opcode-only
#                  alias-analysis barrier facts. They are conservative
#                  fail-closed barriers consumed by alias_analysis.rs.
#   - alias_memory_inert_opcodes - opcode-only MemRegion scalar-register facts.
#                  Omitted opcodes conservatively touch heap memory.
#   - alias_typed_slot_*_opcodes / alias_region_*_opcodes - opcode classes
#                  for alias_analysis.rs MemRegion classification. Omitted
#                  opcodes are GenericHeap.
#   - alias_transparent_*_opcodes - opcode roles for transparent alias root
#                  propagation. These also feed slot-observation classification.
#   - alias_slot_*_opcodes - opcode classes for alias_analysis.rs slot
#                  observation. Omitted opcodes are conservative observers.
#   - escape_alloc_site_opcodes - opcode-only allocation-root facts for
#                  escape_analysis.rs. Omitted opcodes are not tracked as
#                  allocation roots.
#   - refcount_heap_exposure_opcodes - opcode-only deferred-RC fact for ops
#                  whose operands become heap/external roots and therefore cannot
#                  be treated as non-escaping by refcount_elim.rs.
#   - refcount_balance_inc_opcodes / refcount_balance_dec_opcodes -
#                  opcode-role facts for reference-count balance accounting.
#                  Rendered as one exhaustive role table for refcount_elim.rs.
#   - lowered_state_machine_body_opcodes - body-op half of
#                  TirFunction::has_state_machine. StateDispatch terminators
#                  are the other half, so this remains distinct from the broad
#                  state-machine pass-exclusion fact below.
#   - boxed_runtime_inplace_dispatch_opcodes - first-class opcodes whose boxed
#                  runtime fallback must call `molt_inplace_*` and try the
#                  in-place dunder before binary fallback.
#   - drop_insertion_suspension_point_opcodes - opcode-only frame-retain fact
#                  for drop_insertion.rs. Omitted opcodes do not suspend and do
#                  not require pre-op coroutine-frame IncRefs.
#   - drop_insertion_return_deferral_barrier_opcodes - opcode-only fact for
#                  explicit RC/free rails that disqualify return-boundary
#                  finalizer-sensitive deferral for touched roots.
#   - fusion_barrier_opcodes - opcode-only deforestation.rs fusion-eligibility
#                  fact: ops that make a comprehension/generator body ineligible
#                  for iterator-chain fusion. A DISTINCT fact from side_effecting
#                  (see its own comment below). Rendered exhaustively over OpCode.
#   - generator_fusion_poll_required_yield_opcodes /
#                  generator_fusion_poll_reject_opcodes - opcode-role facts for
#                  generator_fusion.rs poll-body eligibility. Required-yield,
#                  reject, and neutral roles are rendered as one exhaustive table.
#   - generator_fusion_iter_use_roles - opcode-role facts for generator_fusion.rs
#                  iterator-use safety scanning. The registry owns IterNext vs
#                  optional None-guard membership; the pass owns operand and
#                  terminator use checks.
#   - state_machine_opcodes - opcode-only linear-transform legality fact: ops
#                  that belong to generator/async/coroutine state machines and
#                  therefore cannot be linearly spliced by the TIR function
#                  inliner or module-slot promotion.
#   - i64_overflow_box_dispatch_opcodes - opcode-only raw-i64 overflow-risk fact.
#                  These ops must use boxed dispatch unless value-range proof
#                  keeps operands and results inside the inline integer window.
#   - i64_checked_overflow_triple_opcodes - opcode-only LIR checked-triple fact.
#                  These ops can lower to raw result + overflow box + overflow
#                  flag when type/repr/range proof makes that triple sound.
#   - i64_zero_divisor_guard_opcodes - opcode-only raw-i64 division-family fact.
