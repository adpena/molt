# FRONTEND-SPECIFIC (a) pre-specialization: the typed OpCode (Add/Sub/Mul/Bit*/
# InplaceAdd/Sub/Mul/Eq/Ne/Lt/Le/Gt/Ge) is nothrow, but the frontend emits the
# op BEFORE type specialization, so it may lower to a boxed/dunder path that
# raises (TypeError/__add__ raising/OverflowError); the caret col must attach.
[[frontend_raising_kind]]
kind = "ADD"
reason = "pre-specialization: OpCode::Add is the nothrow typed lane, but a pre-spec `a + b` may lower to boxed molt_add / __add__ which raises"

[[frontend_raising_kind]]
kind = "SUB"
reason = "pre-specialization: OpCode::Sub is the nothrow typed lane, but a pre-spec `a - b` may lower to boxed molt_sub / __sub__ which raises"

