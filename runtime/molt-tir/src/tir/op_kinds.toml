# ===========================================================================
# kind_to_opcode mapper (ssa.rs). OpCode-equivalence groups: canonical = the
# JSON wire kind, aliases = alternate spellings that map identically (the
# |-grouped arms). A kind with NO row here has no first-class opcode — it is
# lifted to Copy{_original_kind} and restored / symbol-dispatched.
# ===========================================================================

[[kind]]
canonical = "add"
aliases = []
mapper_opcode = "Add"

[[kind]]
