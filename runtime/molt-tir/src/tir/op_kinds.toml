# ===========================================================================
# Per-OpCode effect classification (EXHAUSTIVE over the OpCode enum).
#
# Drives opcode_may_throw / opcode_is_side_effecting / opcode_effects
# (tir/passes/effects.rs). The generated match is EXHAUSTIVE — no wildcard arm
# for a listed OpCode — so a newly added OpCode variant fails to compile until
# given an explicit effect row here. Structural kill for bug-class instance #1
# (the matches!-default-false trap that silently classified a new opcode as
# no-effect; the ModuleImportFrom lesson).
#
#   may_throw       : opcode_may_throw — DCE must preserve even if result dead.
#   side_effecting  : opcode_is_side_effecting — has an observable side effect.
#   purity          : opcode_effects triple for LICM/GVN —
#                     "pure"           (consistent+effect_free+nothrow),
#                     "pure_may_throw" (consistent+effect_free, may raise),
#                     "impure"         (not a pure computation).
#   result_arity    : fixed verifier result count ("zero" / "one" / "two") or
#                     "variable" when the result count is context-dependent.
#                     This drives opcode_fixed_result_count_table and replaces
#                     verify.rs's hand-maintained result-count match.
# ===========================================================================

[[opcode]]
