layer = 3
role = "stdlib satellite"

[[crate]]
name = "molt-runtime-zoneinfo"
layer = 3
role = "stdlib satellite"

# ---------------------------------------------------------------------------
# Layer 4 -- the thin backend driver (the ONE crate allowed to know every
# backend) and the runtime fan-in.
# ---------------------------------------------------------------------------

[[crate]]
name = "molt-backend"
layer = 4
role = "thin backend driver + daemon bin; fans in every backend crate"

[[crate]]
name = "molt-runtime"
layer = 4
role = "runtime fan-in over every stdlib satellite + obj-model/db/gpu"

# ---------------------------------------------------------------------------
# Layer 5 -- runtime embedders / host surfaces over molt-runtime.
# ---------------------------------------------------------------------------

[[crate]]
name = "molt-embed"
layer = 5
role = "runtime embedder over molt-runtime"

[[crate]]
name = "molt-ffi"
layer = 5
role = "FFI surface over molt-runtime + obj-model"

[[crate]]
name = "molt-wasm-host"
layer = 5
role = "WASM host over molt-runtime + obj-model"

# ---------------------------------------------------------------------------
# Allowed same-layer edges -- the documented exceptions to "siblings must be
# independent". Each entry is a deliberate, reviewed coupling. The ONLY current
# exception is the future native -> llvm edge (21b flag #2: native is the one
# backend that depends on another). It is listed ahead of the llvm extraction so
# the edge lands green when 21f S4 introduces molt-backend-llvm at layer 3.
# Format: from = depending crate, to = dependency crate (both at the same layer).
# ---------------------------------------------------------------------------

[[allowed_same_layer_edges]]
from = "molt-backend-native"
to = "molt-backend-llvm"
reason = "21b flag #2: native depends on llvm (one-way, feature-gated); llvm -> native stays zero"
