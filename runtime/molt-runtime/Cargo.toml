[package]
name = "molt-runtime"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
build = "build.rs"

[lib]
crate-type = ["staticlib", "rlib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[features]
default = ["stdlib_full", "wasi_host"]

# Full stdlib — everything included (default for native builds)
stdlib_full = [
    "stdlib_crypto", "stdlib_compression", "stdlib_serialization",
    "stdlib_archive", "stdlib_ast", "stdlib_fs_extra", "stdlib_unicode_names",
    "stdlib_tk", "stdlib_net", "stdlib_asyncio", "stdlib_email",
    "stdlib_math", "stdlib_decimal", "stdlib_regex", "stdlib_collections", "stdlib_path", "stdlib_serial", "stdlib_logging", "stdlib_concurrent",
    "stdlib_dbm", "stdlib_importlib_extra", "stdlib_csv",
    "stdlib_signal", "stdlib_select", "stdlib_text", "stdlib_itertools", "stdlib_difflib", "stdlib_logging_ext", "stdlib_http",
    "builtin_set", "builtin_complex", "builtin_memoryview",
    "builtin_contextvars", "builtin_fcntl",
    "cext_loader",
]
stdlib_unicode_names = ["dep:unicode_names2", "molt-runtime-text?/stdlib_unicode_names"]

# Micro — core only, no crypto/compression/network/ast/tk/email/etc.
# Suitable for edge deployment where binary size matters
stdlib_micro = []

# Individual feature groups
stdlib_crypto = [
    "dep:molt-runtime-crypto",
    "dep:sha3",
    "dep:blake2", "dep:blake2b_simd", "dep:blake2s_simd",
    "dep:md4", "dep:ripemd",
    "dep:hmac", "dep:pbkdf2", "dep:scrypt", "dep:subtle",
]
stdlib_compression = ["dep:bzip2", "dep:flate2", "dep:xz2", "dep:molt-runtime-compression"]
stdlib_serialization = ["dep:rmpv", "dep:serde_cbor"]
stdlib_archive = ["dep:zip"]
stdlib_ast = ["dep:rustpython-parser"]
stdlib_fs_extra = ["dep:glob", "dep:tempfile"]
# Granular domain feature gates for resolve_symbol: when disabled, the
# linker can strip the implementation code for unused domains.
stdlib_tk = ["dep:molt-runtime-tk"]
stdlib_net = ["dep:molt-runtime-net", "dep:mio", "dep:socket2", "dep:rustls", "dep:rustls-pemfile", "dep:webpki-roots", "dep:tungstenite"]
stdlib_asyncio = ["dep:molt-runtime-asyncio"]
stdlib_email = []
stdlib_math = ["dep:molt-runtime-math"]
stdlib_decimal = ["stdlib_math"]
stdlib_logging = []
stdlib_concurrent = []
stdlib_dbm = []
stdlib_importlib_extra = []
stdlib_path = ["dep:molt-runtime-path"]
stdlib_collections = ["dep:molt-runtime-collections"]
stdlib_regex = ["dep:molt-runtime-regex"]
stdlib_text = ["dep:molt-runtime-text"]
stdlib_itertools = ["dep:molt-runtime-itertools"]
stdlib_serial = ["dep:molt-runtime-serial"]
stdlib_csv = ["stdlib_serial"]
stdlib_difflib = ["dep:molt-runtime-difflib"]
stdlib_http = ["dep:molt-runtime-http"]
stdlib_logging_ext = ["dep:molt-runtime-logging"]
stdlib_signal = []
stdlib_select = []

# Function-level tree shaking: each builtin type can be excluded.
builtin_set = []
builtin_complex = []
builtin_memoryview = []
builtin_contextvars = []
builtin_fcntl = []

molt_debug_gil = []
molt_tk_native = ["dep:libloading"]
# Enable dlopen-based C extension loading via the CPython ABI shim
cext_loader = ["dep:molt-cpython-abi"]
# Reserved for the freestanding wasm target. Keep this feature independent
# from getrandom Cargo features: getrandom 0.4 selects custom backends via
# cfg(getrandom_backend = "..."), not via a Cargo feature named "custom".
wasm_freestanding = []
vfs_bundle_tar = []
wasi_host = ["stdlib_fs_extra"]

[dependencies]
# Core runtime (always required)
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
molt-runtime-core = { path = "../molt-runtime-core" }
molt-runtime-crypto = { path = "../molt-runtime-crypto", optional = true }
molt-runtime-tk = { path = "../molt-runtime-tk", optional = true }
molt-runtime-compression = { path = "../molt-runtime-compression", optional = true }
molt-runtime-net = { path = "../molt-runtime-net", optional = true }
molt-runtime-asyncio = { path = "../molt-runtime-asyncio", optional = true }
molt-runtime-math = { path = "../molt-runtime-math", optional = true }
molt-runtime-path = { path = "../molt-runtime-path", optional = true }
molt-runtime-collections = { path = "../molt-runtime-collections", optional = true }
molt-runtime-regex = { path = "../molt-runtime-regex", optional = true }
molt-runtime-text = { path = "../molt-runtime-text", optional = true }
molt-runtime-itertools = { path = "../molt-runtime-itertools", optional = true }
molt-runtime-serial = { path = "../molt-runtime-serial", optional = true }
molt-runtime-difflib = { path = "../molt-runtime-difflib", optional = true }
molt-runtime-logging = { path = "../molt-runtime-logging", optional = true }
molt-runtime-http = { path = "../molt-runtime-http", optional = true }
molt-cpython-abi = { package = "molt-lang-cpython-abi", path = "../molt-cpython-abi", optional = true, features = ["extension-loader"] }
serde_json = "1.0"
crossbeam-deque = "0.8"
crossbeam-channel = "0.5"
num_cpus = "1.17"
lazy_static = "1.5"
once_cell = "1.21"
memchr = "2.8"
num-bigint = "0.4"
num-integer = "0.1"
num-traits = "0.2"
libm = "0.2"
libc = "0.2"
unicode-ident = "1.0"
unicode-casefold = "0.2"
wtf8 = "0.1"
unicode_names2 = { version = "1.3", optional = true }

# Crypto (all optional)
blake2 = { version = "0.10", optional = true }
blake2b_simd = { version = "1.0", optional = true }
blake2s_simd = { version = "1.0", optional = true }
digest = "0.10"
hmac = { version = "0.12", optional = true }
md4 = { version = "0.10", optional = true }
md-5 = "0.10"
pbkdf2 = { version = "0.12", optional = true }
ripemd = { version = "0.1", optional = true }
scrypt = { version = "0.11", optional = true }
sha1 = "0.10"
sha2 = "0.10"
sha3 = { version = "0.10", optional = true }
subtle = { version = "2.6", optional = true }

# Compression (all optional)
bzip2 = { version = "0.5", default-features = false, features = ["libbz2-rs-sys"], optional = true }
flate2 = { version = "1.1", default-features = false, features = ["rust_backend"], optional = true }
zip = { version = "8", default-features = false, features = ["deflate"], optional = true }

# Serialization (partial — serde_json is used by VFS, keep required)
rmpv = { version = "1.3", optional = true }
serde_cbor = { version = "0.11", optional = true }

# Parsing
rustpython-parser = { version = "0.4", default-features = false, features = ["location", "num-bigint"], optional = true }

# Glob/tempfile
glob = { version = "0.3", optional = true }
tempfile = { version = "3", optional = true }

[build-dependencies]
cc = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
mimalloc = { version = "0.1", default-features = false }
xz2 = { version = "0.1", optional = true }
simdutf = "0.7"
getrandom = "0.4"
mio = { version = "1.1", features = ["os-poll", "net"], optional = true }
socket2 = { version = "0.6", optional = true }
rustls = { version = "0.23", optional = true }
rustls-pemfile = { version = "2.2", optional = true }
webpki-roots = { version = "1.0", optional = true }
tungstenite = { version = "0.28", default-features = false, features = ["handshake", "rustls-tls-webpki-roots"], optional = true }
os_pipe = "1.2"
libloading = { version = "0.8.9", optional = true }

[dev-dependencies]
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.4", features = ["wasm_js"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_Threading",
    "Win32_System_Time",
] }
