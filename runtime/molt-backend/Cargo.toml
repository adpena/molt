[package]
name = "molt-backend"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
cranelift-codegen = { version = "0.130", optional = true, default-features = false, features = ["host-arch", "std", "unwind"] }
cranelift-frontend = { version = "0.130", optional = true }
cranelift-module = { version = "0.130", optional = true }
cranelift-object = { version = "0.130", optional = true }
cranelift-native = { version = "0.130", optional = true }
rayon = "1.10"
serde_json = "1.0"
wasm-encoder = { version = "0.245.1", optional = true }
wasmparser = { version = "0.245.1", optional = true }
egg = { version = "0.9", optional = true }
inkwell = { version = "0.8", features = ["llvm19-1"], optional = true }

[target.'cfg(target_arch = "aarch64")'.dependencies]
cranelift-codegen = { version = "0.130", optional = true, default-features = false, features = ["x86"] }

[target.'cfg(target_arch = "x86_64")'.dependencies]
cranelift-codegen = { version = "0.130", optional = true, default-features = false, features = ["arm64"] }

[features]
default = ["native-backend"]
egraphs = ["egg"]
llvm = ["dep:inkwell"]
luau-backend = []
native-backend = [
    "dep:cranelift-codegen",
    "dep:cranelift-frontend",
    "dep:cranelift-module",
    "dep:cranelift-object",
    "dep:cranelift-native",
]
rust-backend = []
wasm-backend = ["dep:wasm-encoder", "dep:wasmparser"]

[[test]]
name = "jumpful_malformed_control"
required-features = ["wasm-backend"]

[[test]]
name = "loop_continue"
required-features = ["native-backend"]

[[test]]
name = "rust_transpiler_preview"
required-features = ["rust-backend"]

[[test]]
name = "wasm_fastcall_lowering"
required-features = ["wasm-backend"]
