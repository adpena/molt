[package]
name = "molt-backend"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
cranelift = "0.128"
cranelift-codegen = { version = "0.128" }
cranelift-module = "0.128"
cranelift-object = "0.128"
cranelift-native = "0.128"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_path_to_error = "0.1"
molt-obj-model = { package = "molt-lang-obj-model", path = "../molt-obj-model" }
wasm-encoder = { version = "0.245.1", optional = true }
wasmparser = { version = "0.245.1", optional = true }
egg = { version = "0.9", optional = true }

[dev-dependencies]
wasmparser = "0.245.1"

[target.'cfg(target_arch = "aarch64")'.dependencies]
cranelift-codegen = { version = "0.128", features = ["x86"] }

[target.'cfg(target_arch = "x86_64")'.dependencies]
cranelift-codegen = { version = "0.128", features = ["arm64"] }

[features]
egraphs = ["egg"]
luau-backend = []
rust-backend = []
wasm-backend = ["dep:wasm-encoder", "dep:wasmparser"]

[[test]]
name = "jumpful_malformed_control"
required-features = ["wasm-backend"]

[[test]]
name = "rust_transpiler_preview"
required-features = ["rust-backend"]

[[test]]
name = "wasm_fastcall_lowering"
required-features = ["wasm-backend"]
