# ---------------------------------------------------------------------------
# CHECK_EXCEPTION_SKIP_KINDS — frontend `op.kind`s after which emit() does NOT
# auto-insert a CHECK_EXCEPTION. Replaces the hand-kept inline skip set.
#
# This is NOT the complement of may_throw: it is dominated by frontend-only
# control-flow / structural op.kinds (LABEL/JUMP/IF/PHI/EXCEPTION_*/CALLARGS_*/
# *_NEW/...) that have no `[[opcode]]` or `[[kind]]` presence at all, plus two
# DELIBERATE may_throw members (RAISE, STATE_TRANSITION) whose exceptional edge
# is handled structurally elsewhere (an unconditional raise / a generator state
# transition's own LOOP_BREAK_IF_EXCEPTION machinery), so a trailing
# CHECK_EXCEPTION would be dead/wrong. Each row is one frontend UPPERCASE
# `op.kind`, in exactly ONE form:
#
#   opcode = "<OpCode>"                 — opcode-backed; the generator ASSERTS
#       may_throw==false for it (drift guard: a kind that becomes may_throw must
#       not silently remain skip-listed).
#   opcode = "<OpCode>", control_flow = true
#                                       — opcode-backed AND may_throw, but its
#       exceptional control flow is structurally handled (RAISE/STATE_TRANSITION);
#       the generator ASSERTS may_throw==true (the flag must be justified).
#   reason = "..."                      — frontend-only control-flow/structural
#       op.kind with no opcode (the bulk of the set).
# ---------------------------------------------------------------------------

