# @generated SEED — hand-reviewed; thereafter the SINGLE SOURCE OF TRUTH.
# Op-kind registry (molt task #57, phase 2). See
# docs/design/foundation/25_op_kind_registry.md.
#
# This table is the ONE place the cross-component op-"kind"-string vocabulary
# lives. tools/gen_op_kinds.py renders it into:
#   - runtime/molt-backend/src/tir/op_kinds_generated.rs  (mapper + classifier
#     + per-OpCode effect-oracle arms), and
#   - src/molt/frontend/lowering/op_kinds_generated.py    (canonical spellings).
# tests/test_gen_op_kinds.py re-renders in memory and asserts equality with the
# checked-in generated files, so any drift is a test failure. Do NOT edit the
# generated files by hand; edit this table and regenerate.
#
# THREE INDEPENDENT MAPPINGS over the shared kind vocabulary, kept distinct
# because they group differently (load-bearing: e.g. `range_new` is a mapper
# alias of the CallBuiltin group BUT an individual member of the fresh-value
# classifier set):
#   - classifier_* (below) — three FLAT sets of individual kinds (the flat
#                  matches! arms in alias_analysis.rs) + the fresh-value prefix.
#   - [[opcode]]   — per-OpCode effect oracle (exhaustive over the enum).
#   - [[kind]]     — the kind_to_opcode mapper: OpCode-equivalence groups
#                  (canonical + aliases, the |-grouped arms).
#
# NB: TOML requires bare top-level keys (the classifier arrays) to precede any
# [[array-of-tables]] section, so they appear first.

# ===========================================================================
# CopyLowering classifier (alias_analysis.rs). FLAT sets of individual kinds +
# the fresh-value prefix rule. A Copy carrying _original_kind = k is classified
# by these; an unlisted k falls to the fail-closed _ => TransparentAlias
# default (leak-safe, never UAF — docs/design/foundation/20).
# ===========================================================================

# copy_kind_mints_fresh_owned_ref: mints a fresh +1 owned reference.
classifier_fresh_value = [
    "aiter",
    "ascii_from_obj",
    "complex_from_obj",
    "contains",
    "dict_from_obj",
    "dict_items",
    "dict_keys",
    "dict_new",
    "dict_values",
    "enumerate",
    "float_from_obj",
    # The augassign in-place family. Every molt_inplace_* runtime symbol
    # returns an OWNED +1 reference regardless of object identity (a mutating
    # __iadd__-style fast path inc_refs and returns operand 0; the dunder /
    # binary-fallback paths return a fresh owned result) — so the result must
    # be classified as minting ownership, never as a transparent alias of
    # operand 0 (which would leak the +1 under drop insertion). The +=/-=/*=
    # trio rides first-class opcodes (InplaceAdd/Sub/Mul, [[kind]] below);
    # these ten ride the preserved-Copy lane.
    "inplace_bit_and",
    "inplace_bit_or",
    "inplace_bit_xor",
    "inplace_div",
    "inplace_floordiv",
    "inplace_lshift",
    "inplace_matmul",
    "inplace_mod",
    "inplace_pow",
    "inplace_rshift",
    "int_from_obj",
    "int_from_str_of_obj",
    "iter",
    "list_fill_new",
    "list_from_range",
    "list_new",
    "object_new",
    "range_new",
    "repr_from_obj",
    "set_new",
    "slice",
    "slice_new",
    "str_from_obj",
    "string_format",
    "string_join",
    "string_split_field_to_int",
    "tuple_from_list",
    "tuple_new",
]

# ...and the prefix form (the vec_* vectorized-reduction family, each calling a
# dedicated molt_vec_* runtime reduction returning a fresh boxed result).
classifier_fresh_value_prefixes = [
    "vec_",
]

# classify_copy_kind inert bucket: no surviving heap reference to own
# (line/trace_*/missing/nop, the read-only repr/layout guards).
classifier_inert_marker = [
    "guard_bool",
    "guard_dict_shape",
    "guard_float",
    "guard_int",
    "guard_layout",
    "guard_layout_ptr",
    "guard_none",
    "guard_str",
    "line",
    "missing",
    "nop",
    "trace_enter_slot",
    "trace_exit",
]

# copy_kind_is_explicit_no_heap_move: provable no-incref pure move of operand 0
# (bare copy, the named SSA/var moves, the validate-and-pass-through guards).
classifier_no_heap_move = [
    "copy",
    "copy_var",
    "guard_tag",
    "guard_type",
    "identity_alias",
    "load_var",
    "store_var",
]

# ===========================================================================
# Per-OpCode effect classification (EXHAUSTIVE over the OpCode enum).
#
# Drives opcode_may_throw / opcode_is_side_effecting / opcode_effects
# (tir/passes/effects.rs). The generated match is EXHAUSTIVE — no wildcard arm
# for a listed OpCode — so a newly added OpCode variant fails to compile until
# given an explicit effect row here. Structural kill for bug-class instance #1
