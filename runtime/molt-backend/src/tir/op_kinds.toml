# ---------------------------------------------------------------------------
# BINOP_OP_KIND + AUGASSIGN_OP_KIND — the `ast.operator` subclass → frontend
# `op.kind` maps for binary (`a OP b`) and augmented-assignment (`a OP= b`)
# lowering. Replaces the hand-kept `_augassign_op_kind` isinstance-chain and the
# `visit_BinOp` kind-literal chain. Keyed by `ast.operator` subclass __name__.
#
# The generator enforces COMPLETENESS: the set of `ast_op` keys here must equal
# the full set of `ast.operator.__subclasses__()` names — a missing row is a
# GENERATION-TIME failure (the task-#27 lesson: the hand augassign map silently
# omitted 7 inplace kinds). `binop_kind` is the binary form, `augassign_kind`
# the in-place form (which routes through the in-place dunder before the binary
# fallback, matching CPython).
# ---------------------------------------------------------------------------

